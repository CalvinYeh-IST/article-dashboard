<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:var(--ist-ink);}
  .r{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--ist-edge-3);}
  .t{flex:1;}
  .label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ist-mute-3);min-width:120px;font-weight:500}
  .size{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ist-mute);margin-left:auto;}
</style></head>
<body>
  <div class="r"><div class="label">H3 · Modal</div><div class="t" style="font-size:15px;font-weight:500">新增文章</div><div class="size">15 / 500</div></div>
  <div class="r"><div class="label">Body</div><div class="t" style="font-size:14px">中文內容已上架 55 篇，達成年度目標 135 篇的 41%。</div><div class="size">14 / 400</div></div>
  <div class="r"><div class="label">Body · sm</div><div class="t" style="font-size:13px">AI 根據最新數據自動產生</div><div class="size">13 / 400</div></div>
  <div class="r"><div class="label">Caption</div><div class="t" style="font-size:12px;color:var(--ist-mute-2)">全年目標 135 篇｜已上架 55 篇（41%）</div><div class="size">12 / 400</div></div>
  <div class="r"><div class="label">Label</div><div class="t" style="font-size:11px;color:var(--ist-mute-2)">已上架 55 / 目標 135 篇</div><div class="size">11 / 400</div></div>
  <div class="r"><div class="label">Eyebrow</div><div class="t" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ist-mute-3);font-weight:500">CONTENT OPERATIONS</div><div class="size">10 / 500</div></div>
  <div class="r"><div class="label">Micro</div><div class="t" style="font-size:9px;letter-spacing:.08em;color:var(--ist-mute)">CHINESE ARTICLES LIVE</div><div class="size">9 / 400</div></div>
</body></html>
