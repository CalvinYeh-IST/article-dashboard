<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:var(--ist-ink);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{aspect-ratio:2.4/1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .h{font-size:11px;font-weight:500;}.v{font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#1D9E75"><div class="h">EN Chart</div><div class="v">#1D9E75</div></div>
    <div class="sw" style="background:#0F6E56"><div class="h">Teal Deep</div><div class="v">#0F6E56</div></div>
    <div class="sw" style="background:#185FA5"><div class="h">Blue Legacy</div><div class="v">#185FA5</div></div>
    <div class="sw" style="background:#7F77DD"><div class="h">Purple</div><div class="v">#7F77DD</div></div>
    <div class="sw" style="background:#534AB7"><div class="h">Purple Deep</div><div class="v">#534AB7</div></div>
    <div class="sw" style="background:#EF9F27"><div class="h">Amber</div><div class="v">#EF9F27</div></div>
    <div class="sw" style="background:#E6F1FB;color:#185FA5"><div class="h">Blue Soft</div><div class="v">#E6F1FB</div></div>
    <div class="sw" style="background:#EEEDFE;color:#3C3489"><div class="h">Purple Soft</div><div class="v">#EEEDFE</div></div>
  </div>
</body></html>
