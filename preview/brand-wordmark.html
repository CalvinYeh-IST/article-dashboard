<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#F8F7F5;font-family:var(--ist-font-sans);color:#1C1C1C;}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#fff;border:1px solid #E2E0DC;padding:24px 20px}
  .card.dark{background:#1C1C1C}
  .logo{display:flex;align-items:baseline;gap:10px}
  .ist{color:#C8621E;font-size:22px;font-weight:500;letter-spacing:.08em}
  .sep{color:#C8621E;font-size:22px;font-weight:300}
  .cn{font-size:22px;font-weight:500;letter-spacing:.04em}
  .dark .cn{color:#fff}
  .en{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9A9A96;margin-top:6px}
</style></head>
<body>
  <div class="pair">
    <div class="card">
      <div class="logo"><span class="ist">IST</span><span class="sep">·</span><span class="cn">看見台灣基金會</span></div>
      <div class="en">TAIWAN-SEEING FOUNDATION</div>
    </div>
    <div class="card dark">
      <div class="logo"><span class="ist">IST</span><span class="sep">·</span><span class="cn">看見台灣基金會</span></div>
      <div class="en">TAIWAN-SEEING FOUNDATION</div>
    </div>
  </div>
</body></html>
