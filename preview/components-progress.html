<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:#1C1C1C;}
  .row{display:grid;grid-template-columns:70px 1fr 150px 60px;align-items:center;gap:10px;margin-bottom:10px}
  .pl{font-size:11px;color:#888780}
  .pt{height:6px;background:#F1EFE8;border-radius:3px;position:relative;overflow:hidden}
  .pf{position:absolute;top:0;left:0;height:100%;border-radius:3px}
  .pn{font-size:11px;color:#1C1C1C}
  .pct{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;text-align:center}
</style></head>
<body>
  <div class="row"><span class="pl">Q1 / <b>20</b></span><div class="pt"><div class="pf" style="width:100%;background:#C8621E"></div></div><div class="pn">已上架 <b style="color:#C8621E">55</b> 篇</div><span class="pct" style="background:#EAF3DE;color:#3B6D11">100%</span></div>
  <div class="row"><span class="pl">Q2 / <b>60</b></span><div class="pt"><div class="pf" style="width:42%;background:#C8621E"></div></div><div class="pn">已上架 <b style="color:#C8621E">25</b> 篇</div><span class="pct" style="background:#FAEEDA;color:#854F0B">42%</span></div>
  <div class="row"><span class="pl">Q3 / <b>60</b></span><div class="pt"><div class="pf" style="width:10%;background:#3D3D3D"></div></div><div class="pn">已上架 <b style="color:#3D3D3D">6</b> 篇</div><span class="pct" style="background:#FCEBEB;color:#A32D2D">10%</span></div>
  <div class="row"><span class="pl">Q4 / <b>60</b></span><div class="pt"><div class="pf" style="width:0%;background:#3D3D3D"></div></div><div class="pn">已上架 <b style="color:#3D3D3D">0</b> 篇</div><span class="pct" style="background:#FCEBEB;color:#A32D2D">0%</span></div>
</body></html>
