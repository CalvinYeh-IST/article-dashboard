<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:var(--ist-ink);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{aspect-ratio:2.4/1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border:1px solid var(--ist-edge);}
  .sw .h{font-size:11px;font-weight:500;}
  .sw .v{font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.7;}
  .group{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ist-mute-3);margin:4px 0 8px;font-weight:500;}
</style></head>
<body>
  <div class="group">Neutrals · Warm paper</div>
  <div class="row">
    <div class="sw" style="background:#F8F7F5;color:#1C1C1C"><div class="h">Paper</div><div class="v">#F8F7F5</div></div>
    <div class="sw" style="background:#F2F1EE;color:#1C1C1C"><div class="h">Surface</div><div class="v">#F2F1EE</div></div>
    <div class="sw" style="background:#F5F5F3;color:#1C1C1C"><div class="h">Surface 2</div><div class="v">#F5F5F3</div></div>
    <div class="sw" style="background:#F1EFE8;color:#1C1C1C"><div class="h">Edge 3</div><div class="v">#F1EFE8</div></div>
    <div class="sw" style="background:#E2E0DC;color:#1C1C1C"><div class="h">Edge</div><div class="v">#E2E0DC</div></div>
    <div class="sw" style="background:#D3D1C7;color:#1C1C1C"><div class="h">Paper Mono</div><div class="v">#D3D1C7</div></div>
    <div class="sw" style="background:#B4B2A9;color:#fff"><div class="h">Mute 4</div><div class="v">#B4B2A9</div></div>
    <div class="sw" style="background:#9A9A96;color:#fff"><div class="h">Mute</div><div class="v">#9A9A96</div></div>
  </div>
</body></html>
