<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:var(--ist-ink);}
  .group{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ist-mute-3);margin:4px 0 8px;font-weight:500}
  .row{display:flex;gap:10px;margin-bottom:16px;align-items:flex-end}
  .box{background:#C8621E;}
  .cap{font-size:9px;color:var(--ist-mute);text-align:center;margin-top:4px}
  .r{background:#fff;border:1px solid var(--ist-edge);width:80px;height:40px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ist-mute-3)}
  .s{background:#fff;border:1px solid var(--ist-edge);width:80px;height:40px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ist-mute-3)}
</style></head>
<body>
  <div class="group">Spacing (4px base)</div>
  <div class="row">
    <div><div class="box" style="width:4px;height:24px"></div><div class="cap">4</div></div>
    <div><div class="box" style="width:8px;height:24px"></div><div class="cap">8</div></div>
    <div><div class="box" style="width:12px;height:24px"></div><div class="cap">12</div></div>
    <div><div class="box" style="width:16px;height:24px"></div><div class="cap">16</div></div>
    <div><div class="box" style="width:20px;height:24px"></div><div class="cap">20</div></div>
    <div><div class="box" style="width:24px;height:24px"></div><div class="cap">24</div></div>
    <div><div class="box" style="width:32px;height:24px"></div><div class="cap">32</div></div>
  </div>
  <div class="group">Radii</div>
  <div class="row">
    <div><div class="r" style="border-radius:0">0</div><div class="cap">flat</div></div>
    <div><div class="r" style="border-radius:2px">2</div><div class="cap">button</div></div>
    <div><div class="r" style="border-radius:8px">8</div><div class="cap">input</div></div>
    <div><div class="r" style="border-radius:12px">12</div><div class="cap">card</div></div>
    <div><div class="r" style="border-radius:20px">20</div><div class="cap">pill</div></div>
  </div>
  <div class="group">Shadows</div>
  <div class="row">
    <div><div class="s" style="box-shadow:0 1px 4px rgba(0,0,0,.08)">sm</div><div class="cap">floating chip</div></div>
    <div><div class="s" style="box-shadow:0 4px 20px rgba(0,0,0,.12)">md</div><div class="cap">panel</div></div>
    <div><div class="s" style="box-shadow:0 8px 32px rgba(0,0,0,.12)">lg</div><div class="cap">modal</div></div>
  </div>
</body></html>
