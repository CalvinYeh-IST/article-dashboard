<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--ist-font-sans);color:var(--ist-ink);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{aspect-ratio:2.4/1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border:1px solid var(--ist-edge);}
  .sw .h{font-size:11px;font-weight:500;}
  .sw .v{font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.7;}
  .group{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ist-mute-3);margin:4px 0 8px;font-weight:500;}
</style></head>
<body>
  <div class="group">Brand · Ink</div>
  <div class="row">
    <div class="sw" style="background:#C8621E;color:#fff"><div class="h">IST Orange</div><div class="v">#C8621E</div></div>
    <div class="sw" style="background:#9C4A12;color:#fff"><div class="h">Orange Deep</div><div class="v">#9C4A12</div></div>
    <div class="sw" style="background:#EDB896;color:#3D2A1C"><div class="h">Orange Soft</div><div class="v">#EDB896</div></div>
    <div class="sw" style="background:#FBF0E8;color:#9C4A12"><div class="h">Orange Wash</div><div class="v">#FBF0E8</div></div>
    <div class="sw" style="background:#1C1C1C;color:#fff"><div class="h">Ink</div><div class="v">#1C1C1C</div></div>
    <div class="sw" style="background:#2D2D2D;color:#fff"><div class="h">Ink 2 · EN</div><div class="v">#2D2D2D</div></div>
    <div class="sw" style="background:#3D3D3D;color:#fff"><div class="h">Ink 3 · Chart</div><div class="v">#3D3D3D</div></div>
    <div class="sw" style="background:#6B6B6B;color:#fff"><div class="h">Mute 3</div><div class="v">#6B6B6B</div></div>
  </div>
</body></html>
