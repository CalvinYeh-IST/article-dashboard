const FIXED_YEAR = '2026';
const QS         = ['Q1', 'Q2', 'Q3', 'Q4'];
const THEMES     = ['文化美食', '自然生態', '常民生活', '藝術文化', '綜覽台灣'];

const SEASONS    = ['春', '夏', '秋', '冬'];

// ★ 用戶指定：2026 年 KPI 目標（ZH: 120/年, EN: 80/年，依季平均分配）
const KPI_TARGETS = {
  '2026': {

};

// Lock screen settings — identical to original index.html

// Colours (IST design tokens)

  paper: '#F8F7F5', surface: '#F2F1EE', edge: '#E2E0DC', edgeSoft: '#E8E8E4',
  mute: '#9A9A96', mute2: '#888780', mute3: '#6B6B6B',
  green: '#1A6B45', greenBg: '#D1FAE5',

/* ============================================================
   【B】Utilities — 精確從 main.js v6.0 移植
   ============================================================ */

/** 判斷日期欄位是否為有效上架日（排除 "-"、"--"、"—"、"N/A"、空字串） */
function hasDate(d) {
  if (!d) return false;
  const s = String(d).trim();
  if (s.length < 6) return false;
  if (/^[\s\-—–/NAna]+$/i.test(s)) return false;
  return true;
}

/** 百分比計算，分母為 0 時回傳 0 */
const pct = (a, t) => (t > 0 ? Math.round((a / t) * 100) : 0);

/** 取陣列欄位（相容 Array 或逗號字串） */
function asArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  return String(v).split(/[,，、|/\\]/).map((s) => s.trim()).filter(Boolean);
}

/** 座標解析，字串/null/空皆回傳 null，否則 parseFloat */
function parseCoord(v) {
  if (v === undefined || v === null || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}
const hasCoords = (a) => parseCoord(a.lat) !== null && parseCoord(a.lng) !== null;

/** 百分比對應顏色與文字，直接從 main.js 移植 */
function pctColor(p) { return p >= 100 ? '#1A6B45' : p >= 80 ? '#A35200' : '#B91C1C'; }
function pctBg(p)    { return p >= 100 ? '#D1FAE5' : p >= 80 ? '#FEF3C7' : '#FEE2E2'; }
function pctText(p)  { return p >= 100 ? '達標'   : p >= 80 ? '接近'   : '落後'; }
function pctTone(p)  { return { fg: pctColor(p), bg: pctBg(p), label: pctText(p) }; }

/** ISO 週次計算（main.js getISOWeek） */
function getISOWeek(d) {
  const date = new Date(d.getTime());
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
}
function weekDateRange(weekStr) {
  const parts = weekStr.split('-W');
  if (parts.length < 2) return weekStr;
  const yr = parseInt(parts[0]), wk = parseInt(parts[1]);
  const jan4 = new Date(yr, 0, 4);
  const startDay = jan4.getDate() - (jan4.getDay() || 7) + 1 + (wk - 1) * 7;
  const start = new Date(yr, 0, startDay), end = new Date(yr, 0, startDay + 6);
  const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
  return `${fmt(start)}–${fmt(end)}`;
}

/** getKpiStats — 精確從 main.js 移植 */
function getKpiStats(arts, targetYear) {
  const lzQ = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };
  const leQ = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };
  arts.forEach((a) => {
    if (hasDate(a.dateZh) && String(a.dateZh).startsWith(targetYear)) {
      const q = 'Q' + Math.ceil((new Date(a.dateZh).getMonth() + 1) / 3);
      if (lzQ[q] !== undefined) lzQ[q]++;
    }
    if (hasDate(a.dateEn) && String(a.dateEn).startsWith(targetYear)) {
      const q = 'Q' + Math.ceil((new Date(a.dateEn).getMonth() + 1) / 3);
      if (leQ[q] !== undefined) leQ[q]++;
    }
  });
  return { lzQ, leQ };
}

/** buildCumDataByYear — 累積資料，未來月份填 null（折線只畫到當月） */
function buildCumDataByYear(lang, arts, targetYear) {
  const kpi = KPI_TARGETS[targetYear][lang];
  const nowMonth = new Date().getMonth(); // 0-indexed, up to current month
  const lbm = Array(12).fill(0);
  arts.forEach((a) => {
    const ds = lang === 'zh' ? a.dateZh : a.dateEn;
    if (hasDate(ds) && String(ds).startsWith(targetYear)) {
      const m = new Date(ds).getMonth();
      if (m >= 0 && m < 12) lbm[m]++;
    }
  });
  // 累積實際，未來月份 = null
  const cumA = []; let s = 0;
  lbm.forEach((v, i) => { s += v; cumA.push(i <= nowMonth ? s : null); });
  // 目標線（全年均攤）
  const cumT = []; let ts = 0;
  QS.forEach((q) => { const pm = kpi[q] / 3; [0, 1, 2].forEach(() => { ts += pm; cumT.push(Math.round(ts)); }); });
  return { cumA, cumT };
}

/** getMonthlyStatsFromArticles — 月別達標率（強制從 1 月到當前月） */
function getMonthlyStatsFromArticles(arts, year) {
  const kpi = KPI_TARGETS[year];
  const nowMonth = new Date().getMonth() + 1; // 1-indexed
  const result = [];
  for (let mo = 1; mo <= nowMonth; mo++) {
    const moStr = String(mo).padStart(2, '0');
    const prefix = `${year}-${moStr}`;
    const cnAct = arts.filter((a) => hasDate(a.dateZh) && String(a.dateZh).startsWith(prefix)).length;
    const enAct = arts.filter((a) => hasDate(a.dateEn) && String(a.dateEn).startsWith(prefix)).length;
    const q = 'Q' + Math.ceil(mo / 3);
    const cnPlan = Math.round((kpi.zh[q] || 0) / 3);
    const enPlan = Math.round((kpi.en[q] || 0) / 3);
    result.push({
      key: prefix, label: `${mo}月`,
      cnAct, enAct, cnPlan, enPlan,
      cnAchieve: pct(cnAct, cnPlan),
      enAchieve: pct(enAct, enPlan),
    });
  }
  return result;
}

/** Stuck translations — 中文已上架超過 7 天但英文未上架 */
function computeStuck(arts) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return arts.filter((a) =>
    hasDate(a.dateZh) && !hasDate(a.dateEn) &&
    (today - new Date(a.dateZh)) / 86400000 > 7
  );
}

/** Escape HTML (used before injecting into dangerouslySetInnerHTML) */
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

/** formatContent — 智慧斷段，從 main.js 移植 */
function formatContent(raw) {
  if (!raw) return '<p style="color:#9A9A96">（無內文）</p>';
  const cleaned = String(raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
  let paras = cleaned.split(/\n{2,}/);
  if (paras.length <= 1) {
    paras = cleaned.replace(/([。！？!?])/g, '$1\n').split('\n').map((s) => s.trim()).filter((s) => s.length > 0);
    const merged = []; let buf = '';
    for (const s of paras) { buf += s; if (buf.length >= 60) { merged.push(buf); buf = ''; } }
    if (buf) merged.push(buf);
    paras = merged.length > 0 ? merged : [cleaned];
  }
  return paras.map((p) => p.trim()).filter((p) => p.length > 0)
    .map((p) => `<p style="margin:0 0 1.1em 0;font-size:15px;color:#1C1C1C;line-height:1.9;text-align:justify">${escapeHtml(p)}</p>`).join('');
}

/** highlightKeywords — 關鍵字高亮，從 main.js 移植 (#E24B4A 粗體) */
function highlightKeywords(html, kwStr) {
  if (!kwStr) return html;
  const kws = String(kwStr).split(/[,，、\s]+/).map((s) => s.trim()).filter((s) => s.length >= 2);
  if (kws.length === 0) return html;
  let result = html;
  kws.forEach((kw) => {
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    try {
      // Use lookbehind + lookahead to avoid replacing inside existing HTML tags/spans
      const re = new RegExp(`(?<!<[^>]*)${escaped}(?![^<]*>)`, 'g');
      result = result.replace(re, `<span class="ist-kw-hit">${escapeHtml(kw)}</span>`);
    } catch (e) {
      // Safari < 16 lacks lookbehind — fall back to a simple global replace (safe on escaped text)
      const re2 = new RegExp(escaped, 'g');
      result = result.replace(re2, `<span class="ist-kw-hit">${escapeHtml(kw)}</span>`);
    }
  });
  return result;
}

async function sha256Hex(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map((x) => x.toString(16).padStart(2, '0')).join('');
}

/* ============================================================
   【C】Lock Screen — 從 index.html 移植
   ============================================================ */

function LockScreen({ onUnlock }) {
  const [val, setVal]   = useState('');
  const [err, setErr]   = useState('');
  const [busy, setBusy] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    if (!err) return;
    const t = setTimeout(() => setErr(''), 3000);
    return () => clearTimeout(t);
  }, [err]);

  const submit = async () => {
    const v = val.trim();
    if (!v) { setErr('請輸入密碼'); return; }
    setBusy(true);
    try {
      const h = await sha256Hex(v);
      if (h === PASS_HASH) {
        sessionStorage.setItem(SESSION_KEY, Date.now().toString());
        onUnlock();
      } else {
        setErr('密碼錯誤，請重試');
        setVal('');
        inputRef.current?.focus();
      }
    } catch (e) {
      setErr('瀏覽器不支援加密驗證');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="fixed inset-0 bg-[#F8F7F5] flex items-center justify-center z-[9999]">
      <div className="bg-white border border-[#E2E0DC] py-10 px-8 w-[320px] text-center">
        <div className="ist-eyebrow text-[#C8621E] mb-1">IST · 看見台灣基金會</div>
        <div className="text-[18px] font-normal text-[#1C1C1C] mb-1 tracking-wide">內容進度控管系統</div>
        <div className="text-[11px] text-[#9A9A96] mb-7 tracking-wide">Content Operations Dashboard</div>
        <input
          ref={inputRef}
          type="password"
          value={val}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && submit()}
          disabled={busy}
          placeholder="請輸入存取密碼"
          autoComplete="off"
          className="lock-input w-full text-[14px] py-2.5 px-3 border border-[#E2E0DC] bg-white text-[#1C1C1C] outline-none focus:border-[#C8621E] mb-2.5"
        />
        <button
          onClick={submit}
          disabled={busy}
          className="w-full py-2.5 bg-[#C8621E] hover:bg-[#9C4A12] disabled:opacity-50 text-white text-[13px] font-medium uppercase tracking-wider transition-colors"
        >
          {busy ? '驗證中…' : '進入'}
        </button>
        <div className="text-[11px] text-[#B91C1C] mt-2 min-h-[16px] tracking-wide">{err}</div>
        <div className="text-[10px] text-[#C0BDB8] mt-6 uppercase tracking-widest">IST Internal Use Only</div>
      </div>
    </div>
  );
}

/* ============================================================
   【D】Settings Gear — Gemini API Key
   ============================================================ */

function SettingsGear() {
  const [open, setOpen]     = useState(false);
  const [val, setVal]       = useState('');
  const [status, setStatus] = useState({ msg: '', ok: false });
  const panelRef = useRef(null);

  const refreshStatus = useCallback(() => {
    const key = localStorage.getItem('gemini_key');
    setStatus(key
      ? { msg: 'Key 已設定，AI 查詢功能已啟用', ok: true }
      : { msg: '尚未設定 Key，AI 查詢功能暫時無法使用', ok: false }
    );
  }, []);

  useEffect(() => { refreshStatus(); }, [refreshStatus]);

  useEffect(() => {
    if (!open) return;
    const onClick = (e) => {
      if (panelRef.current && !panelRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, [open]);

  const save = () => {
    const v = val.trim();
    if (!v) { setStatus({ msg: '請貼上你的 Gemini API Key', ok: false }); return; }
    localStorage.setItem('gemini_key', v);
    window.__GEMINI_KEY__ = v;
    setVal('');
    setStatus({ msg: '儲存成功！AI 查詢功能已啟用', ok: true });
  };

  const clear = () => {
    localStorage.removeItem('gemini_key');
    window.__GEMINI_KEY__ = '';
    refreshStatus();
  };

  return (
    <>
      <button
        onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}
        className="fixed top-4 right-5 w-9 h-9 rounded-full bg-white border border-[#D3D1C7] flex items-center justify-center text-[#6B6B6B] hover:bg-[#F2F1EE] z-[200] shadow-sm"
        title="API 設定"
      >
        <Settings size={15} strokeWidth={1.5} />
      </button>

      {open && (
        <div
          ref={panelRef}
          onClick={(e) => e.stopPropagation()}
          className="fixed top-[58px] right-5 w-[360px] bg-white border border-[#E8E8E4] rounded-xl p-5 z-[200] shadow-xl"
        >
          <div className="flex items-center gap-2 mb-1">
            <KeyRound size={14} strokeWidth={1.5} className="text-[#C8621E]" />
            <h4 className="text-[13px] font-medium text-[#1C1C1C]">Gemini API Key 設定</h4>
          </div>
          <p className="text-[11px] text-[#888780] mb-3 leading-relaxed">
            每個人用自己申請的 Gemini API Key 即可。
            <br />Key 只存在你的瀏覽器本機，不會上傳到任何地方。
            <br />換電腦或清除瀏覽器資料後需重新貼上。
          </p>
          <div className="flex gap-2">
            <input
              type="password"
              value={val}
              onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && save()}
              placeholder={localStorage.getItem('gemini_key') ? 'Key 已設定（貼上新 Key 可覆蓋）' : '貼上你的 Gemini API Key'}
              className="flex-1 text-[12px] px-2.5 py-1.5 rounded-lg border border-[#D3D1C7] bg-white text-[#1C1C1C] outline-none focus:border-[#C8621E] font-mono"
            />
            <button
              onClick={save}
              className="text-[12px] px-3 py-1.5 rounded-lg border border-[#B5D4F4] bg-[#E6F1FB] text-[#185FA5] hover:bg-[#B5D4F4] font-medium whitespace-nowrap"
            >儲存</button>
          </div>
          <div
            className={`text-[11px] mt-2 px-2.5 py-1.5 rounded-md ${
              status.ok ? 'bg-[#EAF3DE] text-[#3B6D11]' : 'bg-[#FAEEDA] text-[#854F0B]'
            }`}
          >
            {status.msg}
          </div>
          {localStorage.getItem('gemini_key') && (
            <button
              onClick={clear}
              className="mt-2 text-[10px] text-[#9A9A96] hover:text-[#B91C1C]"
            >清除已儲存的 Key</button>
          )}
        </div>
      )}
    </>
  );
}

function App() {
  const [unlocked, setUnlocked] = useState(() => {
    const ts = sessionStorage.getItem(SESSION_KEY);
    return ts && Date.now() - parseInt(ts) < SESSION_TTL;
  });
  const [articles, setArticles]             = useState([]);
  const [contentSummary, setContentSummary] = useState(null);
  const [loading, setLoading]               = useState(true);
  const [error, setError]                   = useState(null);
  const [view, setView]                     = useState('strategic');

  useEffect(() => {
    if (!unlocked) return;
    Promise.all([
      fetch('content.json').then((r) => r.ok ? r.json() : Promise.reject(new Error(`content.json HTTP ${r.status}`))),
      fetch('content_summary.json').then((r) => r.ok ? r.json() : null).catch(() => null),
    ])
      .then(([articles, summary]) => {
        setArticles(Array.isArray(articles) ? articles : []);
        setContentSummary(summary || null);
        setLoading(false);
      })
      .catch((e) => { setError(e.message); setLoading(false); });
  }, [unlocked]);

  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;

  if (loading) {
    return (
      <>
        <SettingsGear />
        <div className="h-screen flex flex-col items-center justify-center gap-3 bg-[#F8F7F5]">
          <div className="ist-eyebrow text-[#C8621E]">IST · 看見台灣基金會</div>
          <div className="text-sm text-[#888780] ist-pulse">載入資料中，請稍候…</div>
        </div>
      </>
    );
  }

  if (error) {
    return (
      <>
        <SettingsGear />
        <div className="h-screen flex items-center justify-center bg-[#F8F7F5]">
          <div className="max-w-md border border-[#B91C1C] bg-[#FEE2E2] p-5">
            <div className="text-sm text-[#B91C1C] font-medium mb-2">資料載入失敗</div>
            <div className="text-xs text-[#B91C1C] opacity-80 leading-relaxed">{error}</div>
            <div className="text-[11px] text-[#6B6B6B] mt-3">
              請確認 <code className="bg-white px-1 py-0.5">content.json</code> 與本檔案位於同一目錄，並透過本機伺服器開啟（非 file://）。
            </div>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <SettingsGear />
      <div className="flex h-screen bg-[#F8F7F5]">
        <Sidebar view={view} onChange={setView} count={articles.length} />
        <main className="flex-1 overflow-hidden relative">
          {view === 'strategic' && <StrategicManagement articles={articles} />}
          {view === 'data'      && <DataManagement      articles={articles} summary={contentSummary} />}
          {view === 'article'   && <ArticleManagement   articles={articles} />}
          {view === 'planner'   && <TravelPlanner       articles={articles} />}
        </main>
      </div>
    </>
  );
}

/* ============================================================
   【G】Tab 1: Strategic & Management  (長官版 + 主管版)

function StrategicManagement({ articles }) {
  // Executive stats — from main.js renderExec
  const total  = articles.length;
  const cnPub  = articles.filter((a) => hasDate(a.dateZh)).length;
  const enPub  = articles.filter((a) => hasDate(a.dateEn)).length;
  const unpub  = total - cnPub;
  const statusCounts = useMemo(() => ({
    '待上架': articles.filter((a) => !hasDate(a.dateZh) && a.status === '待上架').length,
    '待改稿': articles.filter((a) => !hasDate(a.dateZh) && a.status === '待改稿').length,
    '待初審': articles.filter((a) => !hasDate(a.dateZh) && a.status === '待初審').length,
  }), [articles]);

  const otherUnpub = unpub - statusCounts['待上架'] - statusCounts['待改稿'] - statusCounts['待初審'];

  // Manager metrics — all computed from articles, matching main.js renderMgr exactly
  const { lzQ, leQ } = useMemo(() => getKpiStats(articles, FIXED_YEAR), [articles]);
  const kpi = KPI_TARGETS[FIXED_YEAR];
  const totalTZh = Object.values(kpi.zh).reduce((a, b) => a + b, 0);
  const totalTEn = Object.values(kpi.en).reduce((a, b) => a + b, 0);
  const totalLZh = articles.filter((a) => hasDate(a.dateZh) && String(a.dateZh).startsWith(FIXED_YEAR)).length;
  const totalLEn = articles.filter((a) => hasDate(a.dateEn) && String(a.dateEn).startsWith(FIXED_YEAR)).length;

  const nowMonth = new Date().getMonth() + 1;
  const nowQ     = 'Q' + Math.ceil(nowMonth / 3);
  const qTZh = kpi.zh[nowQ] || 0;
  const qTEn = kpi.en[nowQ] || 0;
  const qLZh = lzQ[nowQ] || 0;
  const qLEn = leQ[nowQ] || 0;

  const moStr    = String(nowMonth).padStart(2, '0');
  const moPrefix = `${FIXED_YEAR}-${moStr}`;
  const moTZh    = Math.round((kpi.zh[nowQ] || 0) / 3);
  const moTEn    = Math.round((kpi.en[nowQ] || 0) / 3);
  const moLZh    = articles.filter((a) => hasDate(a.dateZh) && String(a.dateZh).startsWith(moPrefix)).length;
  const moLEn    = articles.filter((a) => hasDate(a.dateEn) && String(a.dateEn).startsWith(moPrefix)).length;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const nowWk = getISOWeek(today);
  const wkLZh = articles.filter((a) => hasDate(a.dateZh) && String(a.dateZh).startsWith(FIXED_YEAR) && getISOWeek(new Date(a.dateZh)) === nowWk).length;
  const wkLEn = articles.filter((a) => hasDate(a.dateEn) && String(a.dateEn).startsWith(FIXED_YEAR) && getISOWeek(new Date(a.dateEn)) === nowWk).length;
  const wkTZh = Math.round(totalTZh / 52);
  const wkTEn = Math.round(totalTEn / 52);

  // Translation rate — global (main.js)
  const globalCnPub = cnPub;
  const globalEnPub = enPub;
  const globalTransRate = pct(globalEnPub, globalCnPub);

  const stuck = useMemo(() => computeStuck(articles), [articles]);

  const monthStats = useMemo(() => getMonthlyStatsFromArticles(articles, FIXED_YEAR), [articles]);

  return (
    <div className="h-full overflow-auto">
      <div className="max-w-[1180px] mx-auto px-8 py-8">
        {/* Header */}
        <div className="mb-6 flex items-end justify-between flex-wrap gap-3">
          <div>
            <div className="ist-eyebrow">Strategic & Management</div>
            <h1 className="text-[22px] font-medium text-[#1C1C1C] mt-1">策略與管理</h1>
            <p className="text-[11px] text-[#9A9A96] mt-0.5">
              長官報告 + 主管報告 · 固定顯示 {FIXED_YEAR} 年度
            </p>
          </div>
          <div className="text-[10px] text-[#9A9A96]">資料更新：{new Date().toLocaleDateString('zh-TW')}</div>
        </div>

        {/* ===== 長官版區 ===== */}
        <div className="mb-8">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-[12px] px-3 py-0.5 bg-[#C8621E] text-white font-medium tracking-wide">{FIXED_YEAR}</span>
            <span className="text-[11px] text-[#9A9A96]">長官報告 · 全資料庫總覽</span>
          </div>

          {/* Hero banner */}
          <div className="bg-white border border-[#E2E0DC] p-6 mb-4 flex items-center justify-between flex-wrap gap-6">
            <div>
              <div className="ist-eyebrow">全資料庫總文章數</div>
              <div className="text-[52px] font-light text-[#1C1C1C] leading-none tracking-tight mt-1">{total}</div>
              <div className="text-[11px] text-[#9A9A96] mt-1">歷年累積 · 含所有狀態</div>
            </div>
            <div className="flex gap-3">
              <HeroStatCell label="中文稿上架" value={cnPub} pctVal={pct(cnPub, total)} accent="#C8621E" />
              <HeroStatCell label="英譯稿上架" value={enPub} pctVal={pct(enPub, total)} accent="#2D2D2D" />
              <HeroStatCell label="有地理座標" value={articles.filter(hasCoords).length} pctVal={pct(articles.filter(hasCoords).length, total)} accent="#1A6B45" />
            </div>
          </div>

          {/* Published vs Unpublished */}
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div className="p-5" style={{ background: '#FBF0E8', border: '1px solid #EDB896' }}>
              <div className="ist-eyebrow" style={{ color: '#C8621E' }}>已上架文章</div>
              <div className="text-[40px] font-light leading-none tracking-tight mt-1 mb-3 text-[#C8621E]">{cnPub + enPub}</div>
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-white/80 p-3.5">
                  <div className="text-[9px] uppercase tracking-wider text-[#C8621E] mb-1 font-semibold">中文稿</div>
                  <div className="text-[24px] font-light text-[#C8621E]">{cnPub}</div>

            </div>

                ))}
                {otherUnpub > 0 && (
                  <div className="flex justify-between items-center bg-white/50 px-2.5 py-1.5">
                    <span className="text-[11px] text-[#6B6B6B]">其他</span>
                    <span className="text-[13px] font-medium text-[#6B6B6B]">{otherUnpub} 篇</span>

          {/* KPI Quarterly */}
          <div className="grid grid-cols-2 gap-4 mb-4">
            <KpiQuarterBlock lang="zh" liveByQ={lzQ} />

          <div className="bg-white border border-[#E8E8E4] rounded-xl p-5">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-1">
              <span className="text-[13px] font-medium">{FIXED_YEAR} 全年累積上架進度</span>
              <span className="text-[11px] text-[#888780]">實際累積 vs 目標進度線 · 未來月份不顯示</span>
            </div>
            <div style={{ height: 260 }}>
              <CumulativeLineChart articles={articles} year={FIXED_YEAR} />
            </div>
          </div>
        </div>

        {/* ===== 主管版區 ===== */}
        <div>
          <div className="flex items-center gap-2 mb-4">
            <span className="text-[12px] px-3 py-0.5 bg-[#C8621E] text-white font-medium tracking-wide">{FIXED_YEAR}</span>
            <span className="text-[11px] text-[#9A9A96]">主管報告 · 達標率概覽</span>

              <div className="px-4 py-2.5 text-[10px] font-semibold text-[#C8621E] border-r border-[#E2E0DC] flex items-center gap-1.5 uppercase tracking-wider">
                <span className="w-2 h-2 bg-[#C8621E]" />中文稿
              </div>
              <div className="px-4 py-2.5 text-[10px] font-semibold text-[#2D2D2D] flex items-center gap-1.5 uppercase tracking-wider">
                <span className="w-2 h-2 bg-[#2D2D2D]" />英譯稿
              </div>
            </div>
            <RateRow label="全年 KPI" period={`目標 ${totalTZh} / ${totalTEn} 篇`} cnAct={totalLZh} cnTgt={totalTZh} enAct={totalLEn} enTgt={totalTEn} />
            <RateRow label="本季 KPI" period={nowQ} cnAct={qLZh} cnTgt={qTZh} enAct={qLEn} enTgt={qTEn} />
            <RateRow label="本月進度" period={new Date().toLocaleDateString('zh-TW', { month: 'long' })} cnAct={moLZh} cnTgt={moTZh} enAct={moLEn} enTgt={moTEn} />
            <RateRow label={`本週進度（W${String(nowWk).padStart(2, '0')}）`} period={weekDateRange(`${FIXED_YEAR}-W${String(nowWk).padStart(2, '0')}`)} cnAct={wkLZh} cnTgt={wkTZh} enAct={wkLEn} enTgt={wkTEn} isLast />
          </div>

          {/* Translation Rate + Stuck */}
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div className="bg-white border border-[#E2E0DC] p-4">
              <div className="ist-eyebrow mb-2">中英轉譯率（累計 · 全資料庫）</div>
              <div className="flex items-baseline gap-2 mb-2">
                <span className="text-[36px] font-light leading-none tracking-tight"
                      style={{ color: globalTransRate >= 80 ? '#1A6B45' : globalTransRate >= 50 ? '#A35200' : '#B91C1C' }}>
                  {globalTransRate}%
                </span>
                <span className="text-[10px] px-2 py-0.5 font-semibold"
                      style={{ background: globalTransRate >= 80 ? '#D1FAE5' : globalTransRate >= 50 ? '#FEF3C7' : '#FEE2E2',
                               color: globalTransRate >= 80 ? '#1A6B45' : globalTransRate >= 50 ? '#A35200' : '#B91C1C' }}>
                  {globalTransRate >= 80 ? '健康' : globalTransRate >= 50 ? '偏低' : '警告'}

                borderColor: stuck.length > 0 ? '#FECACA' : '#6EE7B7',

                <AlertTriangle size={12} strokeWidth={1.75} style={{ color: stuck.length > 0 ? '#B91C1C' : '#1A6B45' }} />

              </div>
              <div className="flex items-baseline gap-2 mb-2">
                <span className="text-[36px] font-light leading-none tracking-tight" style={{ color: stuck.length > 0 ? '#B91C1C' : '#1A6B45' }}>
                  {stuck.length}
                </span>
                <span className="text-[11px]" style={{ color: stuck.length > 0 ? '#B91C1C' : '#1A6B45' }}>篇</span>
              </div>
              <div className="text-[11px]" style={{ color: stuck.length > 0 ? '#B91C1C' : '#1A6B45' }}>
                中文已上架超過 7 天但尚無英文上架日
              </div>
              {stuck.length > 0 && stuck.length <= 5 && (
                <details className="mt-2">
                  <summary className="text-[10px] cursor-pointer text-[#B91C1C]">查看清單</summary>
                  <div className="mt-1 flex flex-col gap-1 max-h-32 overflow-y-auto">
                    {stuck.slice(0, 10).map((a) => (
                      <div key={a.id} className="text-[10px] text-[#B91C1C] truncate" title={a.title}>· {a.title}</div>
                    ))}
                  </div>
                </details>
              )}
            </div>
          </div>

          {/* Monthly achievement */}
          <div className="bg-white border border-[#E8E8E4] rounded-xl p-5 mb-4">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-1">
              <span className="text-[13px] font-medium">月別達標率</span>
              <span className="text-[11px] text-[#888780]">從 articles 日期即時計算 · 月目標 = 季目標 ÷ 3</span>
            </div>
            <div className="grid gap-2" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))' }}>
              {monthStats.map((m) => (
                <div key={m.key} className="p-3.5 bg-[#F8F7F5] border border-[#E2E0DC]">
                  <div className="text-[11px] font-medium text-[#1C1C1C] mb-2">{m.label}</div>
                  <MiniMonthBar label="中文稿" achieve={m.cnAchieve} color="#C8621E" />
                  <MiniMonthBar label="英譯稿" achieve={m.enAchieve} color="#3D3D3D" />
                  <div className="text-[9px] text-[#9A9A96] mt-1.5">
                    中 {m.cnAct}/{m.cnPlan} · 英 {m.enAct}/{m.enPlan}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function HeroStatCell({ label, value, pctVal, accent }) {
  return (
    <div className="text-center px-5 py-3 bg-[#F8F7F5] border border-[#E2E0DC] min-w-[110px]">
      <div className="text-[9px] uppercase tracking-wider text-[#6B6B6B] mb-1">{label}</div>
      <div className="text-[28px] font-light tracking-tight leading-none" style={{ color: accent }}>{value}</div>
      <div className="text-[10px] text-[#9A9A96] mt-1">{pctVal}%</div>
    </div>

function KpiQuarterBlock({ lang, liveByQ }) {
  const isZh = lang === 'zh';
  const kpi = KPI_TARGETS[FIXED_YEAR][lang];
  const totalT = Object.values(kpi).reduce((a, b) => a + b, 0);
  const totalL = Object.values(liveByQ).reduce((a, b) => a + b, 0);
  const color = isZh ? '#C8621E' : '#3D3D3D';
  return (
    <div className="bg-white border border-[#E8E8E4] rounded-xl p-5">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-1">
        <span className="text-[13px] font-medium">
          {isZh ? '中文稿' : '英譯稿'} · {FIXED_YEAR} KPI
        </span>
        <span className="text-[11px] text-[#888780]">
          全年 {totalT} 篇｜已上架 {totalL} 篇（{pct(totalL, totalT)}%）
        </span>
      </div>
      {QS.map((q) => {
        const t = kpi[q], l = liveByQ[q] || 0;
        const p = pct(l, t);
        const tone = pctTone(p);
        return (
          <div key={q} className="grid items-center gap-2 mb-2" style={{ gridTemplateColumns: '60px 1fr 110px 52px' }}>
            <span className="text-[11px] text-[#888780]">
              {q} / <strong className="font-medium text-[#1C1C1C]">{t}</strong> 篇
            </span>
            <div className="h-1.5 bg-[#E8E8E4] rounded-sm overflow-hidden">
              <div className="h-full rounded-sm transition-all duration-500" style={{ width: `${Math.min(100, p)}%`, background: color }} />
            </div>
            <div className="text-[11px]">
              已上架 <strong className="font-medium" style={{ color }}>{l}</strong> 篇
            </div>
            <span className="text-[10px] px-1.5 py-0.5 rounded font-medium text-center" style={{ background: tone.bg, color: tone.fg }}>
              {p}%
            </span>
          </div>
        );
      })}
    </div>
  );
}

function RateRow({ label, period, cnAct, cnTgt, enAct, enTgt, isLast }) {
  const cnP = pct(cnAct, cnTgt), enP = pct(enAct, enTgt);
  return (

}

/** GroupedBarChart — main.js makeGroupedChart 邏輯精確移植（fuzzy match） */
function GroupedBarChart({ articles, dim, labels, height }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const fuzzy = (a, k, val) => asArr(a[k]).some((v) => v.includes(val) || val.includes(v));
    const data = labels.map((v) => ({
      total: articles.filter((a) => fuzzy(a, dim, v)).length,
      cn:    articles.filter((a) => fuzzy(a, dim, v) && hasDate(a.dateZh)).length,
      en:    articles.filter((a) => fuzzy(a, dim, v) && hasDate(a.dateEn)).length,
    }));
    const chart = new Chart(canvasRef.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '全資料庫',   data: data.map((d) => d.total), backgroundColor: C.all,   borderWidth: 0 },
          { label: '中文已上架', data: data.map((d) => d.cn),    backgroundColor: C.cnBar, borderWidth: 0 },
          { label: '英文已上架', data: data.map((d) => d.en),    backgroundColor: C.enBar, borderWidth: 0 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { mode: 'index', intersect: false, callbacks: { label: (c) => ` ${c.dataset.label}：${c.raw} 篇` } },
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#9A9A96', font: { size: 11 } } },
          y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#9A9A96', font: { size: 10 } }, min: 0,
               title: { display: true, text: '篇數', color: '#9A9A96', font: { size: 10 } } },
        },
      },
    });
    return () => chart.destroy();
  }, [articles, dim, labels]);
  return <div style={{ height }}><canvas ref={canvasRef} /></div>;
}

function SubdirBarChart({ articles, height }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const map = {};
    articles.forEach((a) => {
      asArr(a.subDir).forEach((s) => {
        if (!s) return;
        if (!map[s]) map[s] = { total: 0, cn: 0, en: 0 };
        map[s].total++;
        if (hasDate(a.dateZh)) map[s].cn++;
        if (hasDate(a.dateEn)) map[s].en++;
      });
    });
    const entries = Object.entries(map).sort((a, b) => b[1].total - a[1].total).slice(0, 10);
    const chart = new Chart(canvasRef.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [
          { label: '全資料庫',   data: entries.map(([, v]) => v.total), backgroundColor: C.all,   borderWidth: 0 },
          { label: '中文已上架', data: entries.map(([, v]) => v.cn),    backgroundColor: C.cnBar, borderWidth: 0 },
          { label: '英文已上架', data: entries.map(([, v]) => v.en),    backgroundColor: C.enBar, borderWidth: 0 },
        ],
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { mode: 'index', intersect: false, callbacks: { label: (c) => ` ${c.dataset.label}：${c.raw} 篇` } },
        },
        scales: {
          x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#9A9A96', font: { size: 10 } } },
          y: { grid: { display: false }, ticks: { color: '#6B6B6B', font: { size: 11 } } },
        },
      },
    });
    return () => chart.destroy();
  }, [articles]);
  return <div style={{ height }}><canvas ref={canvasRef} /></div>;
}

/* ============================================================
   【I】Tab 3: Article Management — 文章查詢 + 詳情 Modal
   ============================================================ */

function ArticleManagement({ articles }) {
  const [q, setQ]           = useState('');
  const [status, setStatus] = useState('');
  const [region, setRegion] = useState('');
  const [theme, setTheme]   = useState('');
  const [subdir, setSubdir] = useState('');
  const [detail, setDetail] = useState(null);

  const allSubdirs = useMemo(
    () => [...new Set(articles.flatMap((a) => asArr(a.subDir)))].filter(Boolean).sort(),
    [articles]
  );

  const filtered = useMemo(() => {
    const kw = q.trim().toLowerCase();
    const fuzzy = (a, k, val) => asArr(a[k]).some((v) => v.includes(val) || val.includes(v));
    return articles.filter((a) => {
      if (status && a.status !== status) return false;
      if (region && !fuzzy(a, 'region', region)) return false;
      if (theme  && !fuzzy(a, 'theme',  theme )) return false;
      if (subdir && !asArr(a.subDir).includes(subdir)) return false;
      if (kw) {
        const blob = [a.title, a.city, a.area, a.storeKw, a.snackKw, a.giftKw, a.sightKw, a.eventKw, a.description].filter(Boolean).join(' ').toLowerCase();
        if (!blob.includes(kw)) return false;
      }
      return true;
    });
  }, [articles, q, status, region, theme, subdir]);

  const exportCsv = () => {
    const rows = [['ID', '年份', '標題', '狀態', '城市', '區域', '中文上架日', '英文上架日', '主題', '地方區域', '子目錄']];
    filtered.forEach((a) => rows.push([
      a.id, a.year, a.title, a.status, a.city || '', a.area || '',
      a.dateZh || '', a.dateEn || '', asArr(a.theme).join('+'), asArr(a.region).join('+'), asArr(a.subDir).join('+'),
    ]));
    const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `ist_articles_${new Date().toISOString().slice(0, 10)}.csv`;
    link.click();
  };

  const clearAll = () => { setQ(''); setStatus(''); setRegion(''); setTheme(''); setSubdir(''); };

  return (
    <div className="h-full overflow-auto">
      <div className="max-w-[1380px] mx-auto px-8 py-8">

        <div className="mb-6">
          <div className="ist-eyebrow">Article Management</div>
          <h1 className="text-[22px] font-medium text-[#1C1C1C] mt-1">文章管理</h1>
          <p className="text-[11px] text-[#9A9A96] mt-0.5">
            全資料庫文章查詢、篩選與檢閱 · 共 {articles.length} 篇
          </p>
        </div>

        {/* Filters */}
        <div className="bg-white border border-[#E2E0DC] p-4 mb-3">
          <div className="flex items-center gap-2 mb-3">
            <Filter size={14} strokeWidth={1.5} className="text-[#6B6B6B]" />
            <span className="ist-eyebrow">條件篩選</span>
            <div className="ml-auto text-[11px] text-[#888780]">
              顯示 <strong className="text-[#1C1C1C] font-medium">{filtered.length}</strong> / {articles.length} 篇
            </div>
            <button
              onClick={clearAll}
              className="text-[11px] px-3 py-1.5 border border-[#E2E0DC] bg-white hover:bg-[#F2F1EE] text-[#6B6B6B]"
            >清除篩選</button>
            <button
              onClick={exportCsv}
              className="text-[11px] px-3 py-1.5 border border-[#E2E0DC] bg-white hover:bg-[#F2F1EE] text-[#6B6B6B] flex items-center gap-1"
            >
              <Download size={12} strokeWidth={1.5} /> 匯出 CSV
            </button>
          </div>
          <div className="grid gap-2" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))' }}>
            <FilterInput placeholder="關鍵字搜尋…" value={q} onChange={setQ} />
            <FilterSelect value={status} onChange={setStatus} options={['', '已上架', '待上架', '待改稿', '待初審', '翻譯中', '審稿/校稿']} placeholder="全部狀態" />
            <FilterSelect value={region} onChange={setRegion} options={['', ...REGIONS]} placeholder="全部區域" />
            <FilterSelect value={theme}  onChange={setTheme}  options={['', ...THEMES]}  placeholder="全部主題" />
            <FilterSelect value={subdir} onChange={setSubdir} options={['', ...allSubdirs]} placeholder="全部子目錄" />
          </div>
        </div>

        {/* Table */}
        <div className="bg-white border border-[#E2E0DC] overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-[12px]" style={{ tableLayout: 'fixed' }}>
              <thead>
                <tr className="bg-[#F2F1EE] border-b border-[#E2E0DC]">
                  <Th w={60}>年</Th>
                  <Th w={360}>標題</Th>
                  <Th w={90}>狀態</Th>
                  <Th w={130}>城市 / 區</Th>
                  <Th w={110}>中文上架</Th>
                  <Th w={110}>英文上架</Th>
                  <Th w={160}>主題</Th>
                  <Th w={80}>座標</Th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 && (
                  <tr><td colSpan={8} className="p-10 text-center text-[12px] text-[#9A9A96]">沒有符合條件的文章</td></tr>
                )}
                {filtered.slice(0, 200).map((a) => (
                  <tr key={a.id} onClick={() => setDetail(a)} className="border-b border-[#F1EFE8] hover:bg-[#F2F1EE] cursor-pointer">
                    <Td className="text-[#6B6B6B]">{a.year}</Td>
                    <Td className="text-[#1C1C1C] font-medium" title={a.title} truncate>{a.title}</Td>
                    <Td><StatusBadge status={a.status} /></Td>
                    <Td className="text-[#6B6B6B]" truncate>{[a.city, a.area].filter(Boolean).join(' · ')}</Td>
                    <Td className="text-[#6B6B6B]">{a.dateZh || '—'}</Td>
                    <Td className="text-[#6B6B6B]">{hasDate(a.dateEn) ? a.dateEn : '—'}</Td>
                    <Td truncate>
                      {asArr(a.theme).slice(0, 2).map((t) => (
                        <span key={t} className="text-[10px] px-1.5 py-0.5 mr-1 bg-[#EEEDFE] text-[#3C3489]">{t}</span>
                      ))}
                    </Td>
                    <Td>{hasCoords(a)
                      ? <span className="inline-flex items-center gap-1 text-[10px] text-[#1A6B45]"><MapPin size={11} strokeWidth={1.5} />有座標</span>
                      : <span className="inline-flex items-center gap-1 text-[10px] text-[#9A9A96]"><AlertTriangle size={11} strokeWidth={1.5} />缺座標</span>
                    }</Td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {filtered.length > 200 && (
            <div className="px-4 py-2 border-t border-[#E2E0DC] text-[10px] text-[#9A9A96] bg-[#F8F7F5]">
              僅顯示前 200 筆 · 使用篩選條件縮小範圍
            </div>
          )}
        </div>
      </div>

      {detail && <ArticleDetailModal article={detail} onClose={() => setDetail(null)} />}
    </div>
  );
}

/* ============================================================
   【J】Tab 4: AI Travel Planner — 真正的 Gemini API 整合
   ============================================================ */

const GEMINI_MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-2.5-flash-lite'];

const PLANNER_SYSTEM_PROMPT = `You are an expert Taiwan travel planner. Your itinerary MUST be physically realistic. Do NOT pack locations that are too close or too far without logic. You MUST account for at least 40 minutes of travel/buffer time between locations. Consider real-world geographic distances in Taiwan. If a user's request is physically impossible within the timeframe, politely explain why and offer a realistic alternative based ONLY on the provided database.`;

/** Build compact article context for Gemini — includes truncated content for semantic matching */
function buildArticleContext(articles, maxContentChars = 600) {
  return articles.map((a) => {
    const parts = [];
    parts.push(`#${a.id} 《${a.title}》`);
    if (a.city || a.area) parts.push(`地點:${[a.city, a.area].filter(Boolean).join('/')}`);
    const region = asArr(a.region).join('+');
    if (region) parts.push(`區域:${region}`);
    const theme = asArr(a.theme).join('+');
    if (theme) parts.push(`主題:${theme}`);
    const season = asArr(a.season).join('+');
    if (season) parts.push(`時令:${season}`);
    const haves = [];
    if (a.hasStore && a.storeKw) haves.push(`店家(${a.storeKw})`);
    if (a.hasSnack && a.snackKw) haves.push(`小吃(${a.snackKw})`);
    if (a.hasGift  && a.giftKw ) haves.push(`伴手禮(${a.giftKw})`);
    if (a.hasSight && a.sightKw) haves.push(`景點(${a.sightKw})`);
    if (a.hasEvent && a.eventKw) haves.push(`活動(${a.eventKw})`);
    if (haves.length) parts.push(haves.join(' '));
    if (hasCoords(a)) parts.push(`座標:(${parseCoord(a.lat).toFixed(3)},${parseCoord(a.lng).toFixed(3)})`);
    if (a.description) parts.push(`描述:${String(a.description).slice(0, 160)}`);
    if (a.content) {
      const content = String(a.content).replace(/\s+/g, ' ').trim().slice(0, maxContentChars);
      parts.push(`內文:${content}`);
    }
    return parts.join('｜');
  }).join('\n');
}

async function callGeminiPlanner({ userQuery, articles, apiKey, signal }) {
  // Prioritise articles with coordinates for travel planning, but include some without
  // so the model can suggest them with "AI Estimated" flag if relevant
  const withCoords    = articles.filter(hasCoords);
  const withoutCoords = articles.filter((a) => !hasCoords(a)).slice(0, 80);
  const poolArticles  = [...withCoords, ...withoutCoords];

  const context = buildArticleContext(poolArticles, 500);

  const prompt = `${PLANNER_SYSTEM_PROMPT}

【 使用者需求 】
${userQuery}

【 可用文章資料庫 (${poolArticles.length} 篇) 】
${context}

【 輸出格式要求 】
請僅以 JSON 格式回覆，不得包含任何其他文字、Markdown 標記或 \`\`\` 區塊。JSON schema：
{
  "summary": "2-3 句話的行程概述（繁體中文）",
  "feasibility": "ok" | "adjusted" | "impossible",
  "message": "如果 feasibility 是 adjusted 或 impossible，用繁體中文說明原因與建議",
  "days": [
    {
      "day": 1,
      "theme": "這天的主題（短），例如：大稻埕歷史美食",
      "stops": [
        {
          "id": <資料庫文章的 id，整數>,
          "arrival_time": "09:00",
          "duration_minutes": 90,
          "reason": "為什麼選這站以及在這個順序的原因，繁體中文"
        }
      ]
    }
  ]
}

規則：
1. 只能使用上方資料庫中存在的 id（整數）。不要發明 id。
2. 每天最多 5 站。總共最多 4 天。
3. 每站之間必須保留至少 40 分鐘交通/緩衝時間（請依台灣實際地理距離判斷）。
4. 如果使用者的需求（例如「一天玩遍全台」）不可行，設定 feasibility="impossible"，在 message 解釋，但仍在 days 提供最接近的可行替代方案。
5. 如果需要調整（例如需要更多天數），設定 feasibility="adjusted"，在 message 解釋調整原因。
6. 只使用資料庫中提供的資料；不要引入資料庫以外的景點。`;

  let lastErr = null;
  for (const model of GEMINI_MODELS) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal,
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: 'application/json',
            temperature: 0.5,
            maxOutputTokens: 4096,
          },
        }),
      });
      const data = await resp.json();
      if (data.error) {
        lastErr = new Error(`${model}: ${data.error.message || data.error.code}`);
        continue;
      }
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) { lastErr = new Error(`${model}: empty response`); continue; }

      // Strip any accidental fencing
      const cleaned = text.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();
      try {
        const parsed = JSON.parse(cleaned);
        return { result: parsed, model, rawText: text };
      } catch (e) {
        lastErr = new Error(`${model}: JSON parse failed — ${e.message}`);
        continue;
      }
    } catch (e) {
      if (e.name === 'AbortError') throw e;
      lastErr = new Error(`${model}: ${e.message}`);
    }
  }
  throw lastErr || new Error('All Gemini models failed');
}

function TravelPlanner({ articles }) {
  const [draft, setDraft]     = useState('');
  const [query, setQuery]     = useState('');
  const [plan, setPlan]       = useState(null);   // Parsed Gemini result
  const [busy, setBusy]       = useState(false);
  const [apiErr, setApiErr]   = useState('');
  const [active, setActive]   = useState(null);   // active stop index (day-stop composite id)
  const [hasKey, setHasKey]   = useState(() => !!localStorage.getItem('gemini_key'));
  const abortRef = useRef(null);

  // Re-check key every few seconds (in case user opened settings)
  useEffect(() => {
    const t = setInterval(() => setHasKey(!!localStorage.getItem('gemini_key')), 1500);
    return () => clearInterval(t);
  }, []);

  // Build article lookup by id
  const articleById = useMemo(() => {
    const m = new Map();
    articles.forEach((a) => m.set(a.id, a));
    return m;
  }, [articles]);

  // Flatten plan into stop list with resolved article info
  const resolvedStops = useMemo(() => {
    if (!plan?.days) return [];
    const list = [];
    plan.days.forEach((d) => {
      (d.stops || []).forEach((s, j) => {
        const a = articleById.get(s.id);
        if (!a) return; // Gemini returned unknown id — silently skip
        list.push({
          day: d.day,
          dayTheme: d.theme,
          order: j + 1,
          stop: s,
          article: a,
          estimated: !hasCoords(a),
          key: `${d.day}-${j}`,
        });
      });
    });
    // Number stops 1..N across whole trip
    list.forEach((x, i) => { x.globalIdx = i + 1; });
    return list;
  }, [plan, articleById]);

  const geotagged = useMemo(() => articles.filter(hasCoords), [articles]);

  const submit = async () => {
    const q = draft.trim();
    if (!q) return;
    const key = localStorage.getItem('gemini_key');
    if (!key) { setApiErr('尚未設定 Gemini API Key，請點右上角齒輪圖示設定'); return; }

    setQuery(q);
    setBusy(true);
    setApiErr('');
    setPlan(null);
    setActive(null);

    abortRef.current?.abort();
    abortRef.current = new AbortController();

    try {
      const { result } = await callGeminiPlanner({
        userQuery: q,
        articles,
        apiKey: key,
        signal: abortRef.current.signal,
      });
      setPlan(result);
      if (result?.days?.[0]?.stops?.[0]) {
        setActive(`${result.days[0].day}-0`);
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        setApiErr(`API 錯誤：${e.message}`);
      }
    } finally {
      setBusy(false);
    }
  };

  const activeStop = resolvedStops.find((s) => s.key === active);

  return (
    <div className="relative h-full bg-[#F8F7F5] overflow-hidden">
      {/* Map full-bleed */}
      <div className="absolute inset-0">
        <PlannerMap
          geotagged={geotagged}
          stops={resolvedStops}
          activeKey={active}
          onMarkerClick={setActive}
        />
      </div>

      {/* Left glass panel */}
      <aside className="absolute top-0 left-0 bottom-0 w-[380px] z-[500] flex flex-col ist-glass">
        <div className="px-5 py-5 border-b border-white/50">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-full bg-[#C8621E] flex items-center justify-center shadow-md">
              <Sparkles size={15} strokeWidth={1.75} className="text-white" />
            </div>
            <div>
              <div className="ist-eyebrow text-[#C8621E]">AI Travel Planner</div>
              <div className="text-[15px] font-medium text-[#1C1C1C] leading-tight">AI 行程規劃</div>
            </div>
          </div>
          <p className="text-[11px] text-[#888780] mt-3 leading-relaxed">
            描述你想要的台灣旅程，AI 會根據 <strong className="text-[#1C1C1C] font-medium">{articles.length}</strong> 篇文章（其中 {geotagged.length} 個有地理座標）為你規劃可行的行程。
          </p>
          {!hasKey && (
            <div className="mt-3 px-2.5 py-1.5 rounded-md bg-[#FAEEDA] text-[#854F0B] text-[11px] flex items-start gap-1.5">
              <KeyRound size={12} strokeWidth={1.5} className="mt-0.5 shrink-0" />
              <span>請先點擊右上角齒輪圖示設定 Gemini API Key</span>
            </div>
          )}
        </div>

        {/* Input */}
        <div className="px-5 py-4 border-b border-white/50">
          <div className="relative">
            <textarea
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
              }}
              disabled={busy}
              placeholder="例：規劃三天兩夜北部文化美食之旅，或 想去離島看自然生態"
              className="w-full text-[13px] p-3 pr-12 border border-[#E2E0DC] bg-white/80 rounded-lg resize-none focus:outline-none focus:border-[#C8621E] placeholder:text-[#9A9A96] disabled:opacity-60"
              rows={3}
            />
            <button
              onClick={submit}
              disabled={!draft.trim() || busy}
              className="absolute right-2 bottom-2 w-8 h-8 rounded-md bg-[#C8621E] text-white flex items-center justify-center hover:bg-[#9C4A12] disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              title="生成行程"
            >
              {busy ? <Loader2 size={14} className="animate-spin" /> : <Send size={14} strokeWidth={1.75} />}
            </button>
          </div>
          <div className="flex flex-wrap gap-1.5 mt-2">
            {['北部三天文化美食', '東部自然生態兩天', '九份 + 大稻埕一天', '離島夏季行程'].map((q) => (
              <button
                key={q}
                onClick={() => setDraft(q)}
                disabled={busy}
                className="text-[10px] px-2 py-1 rounded-full bg-white/70 border border-[#E2E0DC] hover:bg-[#FBF0E8] hover:border-[#EDB896] hover:text-[#9C4A12] text-[#6B6B6B] disabled:opacity-50 transition-colors"
              >{q}</button>
            ))}
          </div>
        </div>

        {/* Result scroll area */}
        <div className="flex-1 overflow-y-auto">
          {apiErr && (
            <div className="mx-5 mt-4 px-3 py-2.5 bg-[#FEE2E2] border border-[#FECACA] text-[11px] text-[#B91C1C] rounded">
              {apiErr}
            </div>
          )}

          {!plan && !busy && !apiErr && (
            <div className="px-5 py-6 text-center">
              <Globe size={32} strokeWidth={1.25} className="text-[#C8621E] mx-auto opacity-60" />
              <div className="text-[12px] text-[#888780] mt-3 leading-relaxed">
                輸入你的旅行需求，AI 會從資料庫中<br />挑選相符的地點並規劃行程順序。
              </div>
            </div>
          )}

          {busy && (
            <div className="px-5 py-8 text-center">
              <Loader2 size={28} className="text-[#C8621E] mx-auto animate-spin" />
              <div className="text-[12px] text-[#888780] mt-3">AI 正在規劃行程，可能需要 10–30 秒…</div>
              <div className="text-[10px] text-[#9A9A96] mt-1">已載入 {articles.length} 篇文章供 AI 匹配</div>
            </div>
          )}

          {plan && (
            <>
              {/* Summary */}
              <div className="px-5 py-3 border-b border-white/50">
                <div className="flex items-center gap-1.5 mb-1">
                  <Sparkles size={11} strokeWidth={1.75} className="text-[#C8621E]" />
                  <span className="ist-eyebrow">「{query}」</span>
                </div>
                {plan.feasibility && plan.feasibility !== 'ok' && (
                  <div className={`mb-2 px-2 py-1.5 rounded text-[11px] leading-relaxed ${
                    plan.feasibility === 'impossible'
                      ? 'bg-[#FEE2E2] text-[#B91C1C]'
                      : 'bg-[#FEF3C7] text-[#A35200]'
                  }`}>
                    <div className="flex items-start gap-1.5">
                      <AlertTriangle size={11} strokeWidth={2} className="mt-0.5 shrink-0" />
                      <span>{plan.message || (plan.feasibility === 'impossible' ? '此行程在時間內不可行，以下為建議替代方案。' : '已依實際距離調整行程。')}</span>
                    </div>
                  </div>
                )}
                {plan.summary && (
                  <p className="text-[12px] text-[#1C1C1C] leading-relaxed">{plan.summary}</p>
                )}
              </div>

              {/* Days & timeline */}
              {plan.days?.map((d) => (
                <div key={d.day} className="px-5 py-4 border-b border-white/50">
                  <div className="flex items-baseline gap-2 mb-3">
                    <span className="text-[11px] font-semibold px-2 py-0.5 bg-[#C8621E] text-white rounded">Day {d.day}</span>
                    {d.theme && <span className="text-[12px] text-[#1C1C1C] font-medium">{d.theme}</span>}
                  </div>
                  <ol className="relative">
                    <div className="absolute left-[11px] top-3 bottom-3 w-[1.5px] bg-[#E2E0DC]" />
                    {(d.stops || []).map((s, j) => {
                      const a = articleById.get(s.id);
                      if (!a) return null;
                      const key = `${d.day}-${j}`;
                      return (
                        <TimelineCard
                          key={key}
                          itemKey={key}
                          index={resolvedStops.find((x) => x.key === key)?.globalIdx || j + 1}
                          stop={s}
                          article={a}
                          active={active === key}
                          onEnter={() => setActive(key)}
                        />
                      );
                    })}
                  </ol>
                </div>
              ))}
            </>
          )}
        </div>
      </aside>

      {/* Active popover */}
      {activeStop && (
        <div className="absolute bottom-6 right-6 w-[340px] z-[500] ist-glass rounded-xl overflow-hidden ist-fade-in">

function TimelineCard({ itemKey, index, stop, article, active, onEnter }) {
  const a = article;
  const geo = hasCoords(a);
  return (
    <li
      onMouseEnter={onEnter}
      onClick={onEnter}
      className={`relative pl-9 pb-3 cursor-pointer ist-fade-in`}
      style={{ animationDelay: `${Math.min(index * 40, 400)}ms` }}
    >
      <div
        className={`absolute left-0 top-1 w-[23px] h-[23px] rounded-full flex items-center justify-center text-[10px] font-semibold transition-all border-2 border-white ${
          active ? 'bg-[#9C4A12] text-white scale-110' : 'bg-[#C8621E] text-white'
        }`}
        style={{ boxShadow: active ? '0 4px 16px rgba(200,98,30,0.45)' : '0 1px 3px rgba(0,0,0,0.15)' }}
      >
        {index}
      </div>
      <div className={`rounded-lg px-3 py-2.5 transition-all border ${
        active ? 'bg-white border-[#EDB896] shadow-md' : 'bg-white/60 border-transparent hover:bg-white hover:border-[#E2E0DC]'
      }`}>
        <div className="flex items-start justify-between gap-2 mb-1">
          <div className="text-[12.5px] font-medium text-[#1C1C1C] leading-snug line-clamp-2 flex-1" title={a.title}>
            {a.title}
          </div>
          {!geo && (
            <div title="座標缺失 — AI Estimated, Pending Admin Confirmation"
                 className="shrink-0 w-5 h-5 rounded-full bg-[#FEF3C7] flex items-center justify-center">
              <AlertTriangle size={10} strokeWidth={2} className="text-[#A35200]" />
            </div>
          )}
        </div>
        <div className="flex items-center gap-2 text-[10px] text-[#888780] mb-1">
          {stop.arrival_time && (
            <span className="inline-flex items-center gap-0.5">
              <Clock size={10} strokeWidth={1.5} />{stop.arrival_time}
            </span>
          )}
          {stop.duration_minutes && <span>· {stop.duration_minutes} 分鐘</span>}
          <span className="truncate ml-auto">
            <MapPin size={10} strokeWidth={1.5} className="inline mr-0.5" />
            {[a.city, a.area].filter(Boolean).join(' · ') || '（未註記）'}
          </span>
        </div>
        {stop.reason && (
          <p className="text-[10.5px] text-[#6B6B6B] leading-relaxed line-clamp-3 mb-1.5 italic">
            {stop.reason}
          </p>
        )}
        <div className="flex flex-wrap gap-1">
          {asArr(a.region).slice(0, 1).map((r) => <Chip key={r} color="#FBF0E8" text="#9C4A12">{r}</Chip>)}
          {asArr(a.theme ).slice(0, 1).map((t) => <Chip key={t} color="#EEEDFE" text="#3C3489">{t}</Chip>)}
          {!geo && (
            <span className="text-[9px] px-1.5 py-0.5 bg-[#FEF3C7] text-[#A35200] font-medium inline-flex items-center gap-1">
              <AlertTriangle size={8} strokeWidth={2} /> AI Estimated — Pending Admin Confirmation
            </span>
          )}
        </div>
      </div>
    </li>
  );
}

function ActivePopover({ stop, onClose }) {
  const a = stop.article;
  return (
    <div className="ist-fade-in">
      {a.image_url && (
        <img src={a.image_url} alt="" className="w-full h-32 object-cover"
          onError={(e) => { e.target.style.display = 'none'; }} />
      )}
      <div className="p-4">
        <div className="flex justify-between items-start mb-2 gap-2">
          <div className="flex-1">
            <div className="flex items-center gap-1.5 text-[10px] text-[#C8621E] mb-1">
              <span className="w-5 h-5 rounded-full bg-[#C8621E] text-white flex items-center justify-center text-[9px] font-semibold">{stop.globalIdx}</span>
              <span className="ist-eyebrow text-[#C8621E]">Day {stop.day} · {stop.stop.arrival_time || ''}</span>
            </div>
            <div className="text-[13px] font-medium text-[#1C1C1C] leading-snug">{a.title}</div>
          </div>
          <button onClick={onClose} className="shrink-0 w-6 h-6 flex items-center justify-center text-[#6B6B6B] hover:text-[#1C1C1C]">
            <X size={13} strokeWidth={1.5} />
          </button>
        </div>
        <div className="flex items-center gap-1 text-[11px] text-[#888780] mb-2">
          <MapPin size={11} strokeWidth={1.5} />
          {[a.city, a.area].filter(Boolean).join(' · ') || '（未註記）'}
        </div>
        {stop.estimated && (
          <div className="text-[10px] px-2 py-1 bg-[#FEF3C7] text-[#A35200] mb-2 flex items-center gap-1">
            <AlertTriangle size={10} strokeWidth={2} /> AI Estimated — Pending Admin Confirmation
          </div>
        )}
        {a.description && (
          <p className="text-[11px] text-[#6B6B6B] leading-relaxed line-clamp-4">
            {a.description}
          </p>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   【K】Leaflet Map component
   ============================================================ */

function PlannerMap({ geotagged, stops, activeKey, onMarkerClick }) {
  const containerRef = useRef(null);
  const mapRef       = useRef(null);
  const dotsRef      = useRef([]);
  const markersRef   = useRef(new Map());

  // Init
  useEffect(() => {
    if (mapRef.current || !containerRef.current) return;
    const map = L.map(containerRef.current, {
      center: [23.8, 121.0],
      zoom: 7,
      zoomControl: true,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);
    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; };
  }, []);

  // Faded background dots
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    dotsRef.current.forEach((m) => map.removeLayer(m));
    dotsRef.current = [];
    const stopIds = new Set(stops.map((s) => s.article.id));
    geotagged.forEach((a) => {
      if (stopIds.has(a.id)) return;
      const lat = parseCoord(a.lat), lng = parseCoord(a.lng);
      if (lat === null || lng === null) return;
      const marker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: '', html: '<div class="ist-marker-dot"></div>',
          iconSize: [10, 10], iconAnchor: [5, 5],
        }),
        interactive: true, keyboard: false,
      }).addTo(map);
      marker.bindTooltip(a.title, { direction: 'top', offset: [0, -4] });
      dotsRef.current.push(marker);
    });
  }, [geotagged, stops]);

  // Numbered itinerary markers
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    markersRef.current.forEach((m) => map.removeLayer(m));
    markersRef.current.clear();

    stops.forEach((s) => {
      const a = s.article;
      const lat = parseCoord(a.lat), lng = parseCoord(a.lng);
      if (lat === null || lng === null) return;  // Can't plot AI-Estimated without coords
      const activeCls = activeKey === s.key ? ' active' : '';
      const estCls    = s.estimated ? ' estimated' : '';
      const marker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: '',
          html: `<div class="ist-marker-num${activeCls}${estCls}">${s.globalIdx}</div>`,
          iconSize: [28, 28], iconAnchor: [14, 14],
        }),
        zIndexOffset: activeKey === s.key ? 1000 : 500,
      }).addTo(map);
      marker.bindPopup(
        `<div style="font-weight:500;font-size:12px;color:#1C1C1C;margin-bottom:3px">Day ${s.day} · ${escapeHtml(a.title)}</div>` +
        `<div style="font-size:10px;color:#888780">${escapeHtml([a.city, a.area].filter(Boolean).join(' · ') || '')}</div>` +
        (s.stop.arrival_time ? `<div style="font-size:10px;color:#C8621E;margin-top:3px">抵達 ${escapeHtml(s.stop.arrival_time)}</div>` : ''),
        { maxWidth: 260 }
      );
      marker.on('click', () => onMarkerClick(s.key));
      markersRef.current.set(s.key, marker);
    });

    // Fit bounds
    const coords = stops
      .map((s) => [parseCoord(s.article.lat), parseCoord(s.article.lng)])
      .filter(([la, ln]) => la !== null && ln !== null);
    if (coords.length > 1) {
      map.fitBounds(coords, { padding: [80, 80], maxZoom: 11, animate: true, duration: 0.8 });
    } else if (coords.length === 1) {
      map.flyTo(coords[0], 12, { duration: 0.8 });
    }
  }, [stops, activeKey, onMarkerClick]);

  // FlyTo on active
  useEffect(() => {
    const map = mapRef.current; if (!map || !activeKey) return;
    const s = stops.find((x) => x.key === activeKey);
    if (!s) return;
    const lat = parseCoord(s.article.lat), lng = parseCoord(s.article.lng);
    if (lat === null || lng === null) return;
    map.flyTo([lat, lng], Math.max(map.getZoom(), 12), { duration: 0.9 });
    const marker = markersRef.current.get(activeKey);
    if (marker) marker.openPopup();
  }, [activeKey, stops]);

  return <div ref={containerRef} className="w-full h-full" />;
}

   Mount
