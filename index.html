<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章進度控管儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:1.5rem}
.header{margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.header p{font-size:12px;color:#888780}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;font-size:13px;color:#888780}
.error-screen{background:#FCEBEB;border:1px solid #F7C1C1;border-radius:8px;padding:16px;color:#A32D2D;font-size:13px;margin:1rem 0}

.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.year-tabs{display:flex;gap:4px;flex-wrap:wrap}
.yr{padding:5px 14px;font-size:12px;border-radius:20px;cursor:pointer;border:1px solid #d3d1c7;background:#fff;color:#888780}
.yr.active{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:500}
.yr:hover:not(.active){background:#f1efe8}

.tab-bar{display:flex;border-bottom:1px solid #e0dfd8;margin-bottom:1.5rem}
.tab{padding:9px 20px;font-size:13px;cursor:pointer;border:none;border-bottom:2.5px solid transparent;color:#888780;background:none;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#185FA5;font-weight:500}
.tab:hover:not(.active){color:#1a1a1a}
.view{display:none}.view.active{display:block}

.mcard-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.mcard{background:#fff;border-radius:8px;padding:1rem;border:1px solid #e8e8e4}
.mcard-label{font-size:11px;color:#888780;margin-bottom:5px}
.mcard-val{font-size:26px;font-weight:500;line-height:1;color:#1a1a1a}
.mcard-sub{font-size:11px;color:#b4b2a9;margin-top:4px}
.mcard.ok .mcard-val{color:#0F6E56}
.mcard.warn .mcard-val{color:#854F0B}
.mcard.danger .mcard-val{color:#A32D2D}

.kpi-block{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem}
.kpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.kpi-title{font-size:14px;font-weight:500}
.kpi-meta{font-size:11px;color:#888780}
.progress-row{display:grid;grid-template-columns:56px 1fr 130px 52px;align-items:center;gap:8px;margin-bottom:9px}
.p-label{font-size:11px;color:#888780}
.p-track{height:6px;background:#f1efe8;border-radius:3px;position:relative;overflow:hidden}
.p-fc{position:absolute;top:0;left:0;height:100%;border-radius:3px}
.p-ac{position:absolute;top:0;left:0;height:100%;border-radius:3px}
.p-nums{font-size:11px;color:#1a1a1a}
.pct-pill{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;white-space:nowrap}
.pct-ok{background:#EAF3DE;color:#3B6D11}
.pct-warn{background:#FAEEDA;color:#854F0B}
.pct-danger{background:#FCEBEB;color:#A32D2D}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#888780;margin-top:10px}
.ld{width:10px;height:4px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:4px}

.alert-strip{border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid}
.alert-strip.danger{background:#FCEBEB;border-color:#F7C1C1}
.alert-strip.warn{background:#FAEEDA;border-color:#FAC775}
.a-title{font-size:13px;font-weight:500}
.a-detail{font-size:11px;margin-top:2px}
.alert-strip.danger .a-title,.alert-strip.danger .a-count{color:#A32D2D}
.alert-strip.danger .a-detail{color:#E24B4A}
.alert-strip.warn .a-title,.alert-strip.warn .a-count{color:#854F0B}
.alert-strip.warn .a-detail{color:#BA7517}
.a-count{font-size:22px;font-weight:500}

.pipeline-wrap{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.pipe-divider{display:flex;align-items:center;gap:8px;margin:12px 0}
.pipe-divider-line{flex:1;height:1px;background:#e8e8e4}
.pipe-divider-label{font-size:10px;color:#b4b2a9;padding:0 4px}
.dual-bar-row{display:grid;grid-template-columns:100px 1fr 40px;align-items:center;gap:8px;margin-bottom:6px}
.dual-bar-label{font-size:12px;text-align:right;color:#888780}
.dual-bar-track{height:22px;background:#f1efe8;border-radius:4px;overflow:hidden}
.dual-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:500;color:#fff;min-width:2px}
.dual-bar-num{font-size:12px;font-weight:500;color:#1a1a1a}
.zh-c{background:#185FA5}.en-c{background:#1D9E75}.rv-c{background:#7F77DD}.tr-c{background:#534AB7}.pd-c{background:#EF9F27}

.chart-wrap{position:relative;width:100%}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.filter-bar input,.filter-bar select{font-size:12px;padding:4px 10px;height:32px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#185FA5}
.btn-sm{font-size:12px;padding:4px 12px;height:32px;border-radius:8px;cursor:pointer;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a}
.btn-sm:hover{background:#f1efe8}
.btn-blue{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5;font-weight:500}
.btn-blue:hover{background:#B5D4F4}

.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e8e8e4;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{text-align:left;font-size:11px;font-weight:500;color:#888780;padding:10px 10px;border-bottom:1px solid #e8e8e4;background:#fafaf8;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f1efe8;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.sbadge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
.s0{background:#E6F1FB;color:#185FA5}.s1{background:#EEEDFE;color:#3C3489}
.s2{background:#FAEEDA;color:#854F0B}.s3{background:#EAF3DE;color:#0F6E56}

.qa-wrap{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.qa-title{font-size:14px;font-weight:500;margin-bottom:4px}
.qa-sub{font-size:11px;color:#888780;margin-bottom:14px}
.qa-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.qa-chip{font-size:11px;padding:5px 10px;border-radius:16px;border:1px solid #d3d1c7;cursor:pointer;color:#888780;background:#fff}
.qa-chip:hover{background:#f1efe8;color:#1a1a1a}
.qa-input-row{display:flex;gap:8px;margin-bottom:12px}
.qa-input{flex:1;font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;outline:none}
.qa-input:focus{border-color:#185FA5}
.qa-send{font-size:12px;padding:8px 16px;border-radius:8px;border:1px solid #B5D4F4;background:#E6F1FB;color:#185FA5;cursor:pointer;font-weight:500;white-space:nowrap}
.qa-send:hover{background:#B5D4F4}
.qa-send:disabled{opacity:.5;cursor:not-allowed}
.qa-history{display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto;padding-right:4px}
.qa-bubble-user{align-self:flex-end;background:#E6F1FB;border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:12px;color:#185FA5;max-width:80%}
.qa-bubble-ai{align-self:flex-start;background:#f5f5f3;border-radius:12px 12px 12px 2px;padding:10px 14px;font-size:12px;color:#1a1a1a;max-width:90%;line-height:1.7}
.qa-empty{font-size:12px;color:#b4b2a9;text-align:center;padding:24px 0}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:1.5rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#888780;margin-bottom:4px}
.field input,.field select{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#185FA5}
.cb-row{display:flex;gap:16px}
.cb-wrap{display:flex;align-items:center;gap:5px;font-size:12px;color:#888780;cursor:pointer}
.cb-wrap input{accent-color:#185FA5;cursor:pointer;width:14px;height:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-save{background:#E6F1FB;border:1px solid #B5D4F4;color:#185FA5;font-size:13px;padding:7px 18px;border-radius:8px;cursor:pointer;font-weight:500}
.btn-save:hover{background:#B5D4F4}
.btn-cancel{background:#fff;border:1px solid #d3d1c7;color:#888780;font-size:13px;padding:7px 18px;border-radius:8px;cursor:pointer}
.btn-cancel:hover{background:#f1efe8}
.watermark{font-size:10px;color:#b4b2a9;text-align:right;margin-top:1.5rem}

@media(max-width:600px){
  .mcard-grid{grid-template-columns:1fr 1fr}
  .progress-row{grid-template-columns:48px 1fr 100px 44px}
  .dual-bar-row{grid-template-columns:80px 1fr 32px}
}

/* ── 密碼保護畫面 ── */
#lock-screen{position:fixed;inset:0;background:#F8F7F5;z-index:9999;
  display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#lock-box{background:#fff;border:1px solid #E2E0DC;padding:2.5rem 2rem;width:320px;text-align:center}
#lock-logo{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#C8621E;font-weight:500;margin-bottom:6px}
#lock-title{font-size:18px;font-weight:400;color:#1C1C1C;margin-bottom:4px;letter-spacing:.01em}
#lock-sub{font-size:11px;color:#9A9A96;margin-bottom:1.75rem;letter-spacing:.02em}
#lock-input{width:100%;font-size:14px;padding:10px 12px;border:1px solid #E2E0DC;
  background:#fff;color:#1C1C1C;outline:none;letter-spacing:.12em;text-align:center;
  box-sizing:border-box;margin-bottom:10px}
#lock-input:focus{border-color:#C8621E}
#lock-btn{width:100%;padding:11px;background:#C8621E;color:#fff;border:none;
  font-size:13px;font-weight:500;letter-spacing:.06em;cursor:pointer;
  text-transform:uppercase;transition:background .15s}
#lock-btn:hover{background:#9C4A12}
#lock-err{font-size:11px;color:#B91C1C;margin-top:8px;min-height:16px;letter-spacing:.02em}
#lock-hint{font-size:10px;color:#C0BDB8;margin-top:1.5rem;letter-spacing:.06em;text-transform:uppercase}

</style>
</head>
<body>

<!-- ★ 密碼保護畫面（需求1）-->
<div id="lock-screen">
  <div id="lock-box">
    <div id="lock-logo">IST · 看見台灣基金會</div>
    <div id="lock-title">內容進度控管系統</div>
    <div id="lock-sub">Content Operations Dashboard</div>
    <input id="lock-input" type="password" placeholder="請輸入存取密碼"
      autocomplete="off" onkeydown="if(event.key==='Enter')doUnlock()">
    <button id="lock-btn" onclick="doUnlock()">進入</button>
    <div id="lock-err"></div>
    <div id="lock-hint">IST Internal Use Only</div>
  </div>
</div>

<script>
// ── 密碼設定（修改此處） ──
// 採用 SHA-256 hash 儲存，避免明碼出現在程式碼
// 目前密碼：IST2026（請主管提供後替換 hash）
// 產生新 hash：在瀏覽器 console 執行：
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('你的密碼'))
//     .then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
const PASS_HASH = '737921ff5998fbb8263da00586b664998716f84bf1f9a09246d725d88bc9bd0b'; // ← 由系統管理員填入

// Session 效期（毫秒），預設 8 小時
const SESSION_TTL = 8 * 60 * 60 * 1000;
const SESSION_KEY = 'ist_dash_auth';

async function hashStr(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function doUnlock(){
  const input = document.getElementById('lock-input');
  const err   = document.getElementById('lock-err');
  const val   = input.value.trim();
  if(!val){ err.textContent = '請輸入密碼'; return; }
  const h = await hashStr(val);
  if(h === PASS_HASH){
    sessionStorage.setItem(SESSION_KEY, Date.now().toString());
    document.getElementById('lock-screen').style.display = 'none';
    err.textContent = '';
  } else {
    err.textContent = '密碼錯誤，請重試';
    input.value = '';
    input.focus();
    // 3 秒後清除錯誤訊息
    setTimeout(()=>{ err.textContent=''; }, 3000);
  }
}

// 檢查 session 是否仍有效
(function checkSession(){
  const ts = sessionStorage.getItem(SESSION_KEY);
  if(ts && Date.now() - parseInt(ts) < SESSION_TTL){
    document.getElementById('lock-screen').style.display = 'none';
  }
})();
</script>

<div class="page">
  <div class="header">
    <h1>文章進度控管儀表板</h1>
    <p id="date-label"></p>
  </div>
  <div id="app">
    <div class="loading-screen">載入資料中，請稍候…</div>
  </div>
</div>

<div class="modal-overlay" id="ops-modal">
  <div class="modal">
    <h3 id="modal-title">新增文章</h3>
    <div class="field"><label>年份</label><select id="m-year"></select></div>
    <div class="field"><label>標題</label><input id="m-title" placeholder="文章標題"></div>
    <div class="field"><label>狀態</label>
      <select id="m-status"><option>審稿/校稿</option><option>翻譯中</option><option>待上架</option><option>已上架</option></select>
    </div>
    <div class="field"><label>季度</label>
      <select id="m-q"><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option></select>
    </div>
    <div class="field"><label>中文預計上架日</label><input type="date" id="m-date-zh"></div>
    <div class="field"><label>英文預計上架日</label><input type="date" id="m-date-en"></div>
    <div class="field"><label>已上架確認</label>
      <div class="cb-row">
        <label class="cb-wrap"><input type="checkbox" id="m-live-zh"> 中文已上架</label>
        <label class="cb-wrap"><input type="checkbox" id="m-live-en"> 英文已上架</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveArticle()">儲存</button>
    </div>

</div>

<style>
.settings-btn{position:fixed;top:16px;right:20px;width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid #d3d1c7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.settings-btn:hover{background:#f1efe8}
.settings-panel{display:none;position:fixed;top:56px;right:20px;width:340px;background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.settings-panel.open{display:block}
.settings-panel h4{font-size:13px;font-weight:500;margin-bottom:4px;color:#1a1a1a}
.settings-panel p{font-size:11px;color:#888780;margin-bottom:12px;line-height:1.6}
.settings-row{display:flex;gap:8px}
.settings-input{flex:1;font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a1a;outline:none;font-family:monospace}
.settings-input:focus{border-color:#185FA5}
.settings-save{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid #B5D4F4;background:#E6F1FB;color:#185FA5;cursor:pointer;font-weight:500;white-space:nowrap}
.settings-save:hover{background:#B5D4F4}
.settings-status{font-size:11px;margin-top:8px;padding:6px 10px;border-radius:6px}
.settings-status.ok{background:#EAF3DE;color:#3B6D11}
.settings-status.empty{background:#FAEEDA;color:#854F0B}
</style>

<button class="settings-btn" onclick="toggleSettings()" title="API 設定">⚙</button>

<div class="settings-panel" id="settings-panel">
  <h4>Gemini API Key 設定</h4>
  <p>每個人用自己申請的 Gemini API Key 即可。<br>Key 只存在你的瀏覽器本機，不會上傳到任何地方。<br>換電腦或清除瀏覽器資料後需重新貼上。</p>
  <div class="settings-row">
    <input class="settings-input" id="settings-key-input" type="password" placeholder="貼上你的 Gemini API Key">
    <button class="settings-save" onclick="saveGeminiKey()">儲存</button>
  </div>
  <div class="settings-status" id="settings-status"></div>
</div>

<script>
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  if (!isOpen) {
    const saved = localStorage.getItem('gemini_key') || '';
    const input = document.getElementById('settings-key-input');
    if (saved) input.placeholder = 'Key 已設定（貼上新 Key 可覆蓋）';
    updateSettingsStatus();
  }
}

function saveGeminiKey() {
  const input = document.getElementById('settings-key-input');
  const val   = input.value.trim();
  if (!val) {
    updateSettingsStatus('請貼上你的 Gemini API Key', false);
    return;
  }
  // 移除 AIza 格式限制，任何人的 Gemini Key 皆可使用
  localStorage.setItem('gemini_key', val);
  window.__GEMINI_KEY__ = val;
  input.value       = '';
  input.placeholder = 'Key 已設定（貼上新 Key 可覆蓋）';
  updateSettingsStatus('儲存成功！AI 查詢功能已啟用', true);
}

function updateSettingsStatus(msg, ok) {
  const el  = document.getElementById('settings-status');
  const key = localStorage.getItem('gemini_key');
  if (msg !== undefined) {
    el.textContent = msg;
    el.className   = 'settings-status ' + (ok ? 'ok' : 'empty');
  } else if (key) {
    el.textContent = 'Key 已設定，AI 查詢功能已啟用';
    el.className   = 'settings-status ok';
  } else {
    el.textContent = '尚未設定 Key，AI 查詢功能暫時無法使用';
    el.className   = 'settings-status empty';
  }
}

document.addEventListener('click', e => {
  const panel = document.getElementById('settings-panel');
  if (panel.classList.contains('open') &&
      !panel.contains(e.target) &&
      !e.target.classList.contains('settings-btn')) {
    panel.classList.remove('open');
  }
});

window.__GEMINI_KEY__ = localStorage.getItem('gemini_key') || '';
</script>
<script src="main.js"></script>
</body>
</html>
