<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章進度控管儀表板 · IST</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Söhne","Inter","PingFang TC","Noto Sans TC",-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;color:#1C1C1C;background:#F8F7F5;min-height:100vh}
.page{max-width:1200px;margin:0 auto;padding:1.75rem 2rem 2.5rem}
.header{margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:500;color:#1C1C1C;margin-bottom:4px;letter-spacing:-.01em}
.header p{font-size:11px;color:#9A9A96;letter-spacing:.04em}
.brand-kicker{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#C8621E;font-weight:500;margin-bottom:6px}

.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;font-size:13px;color:#9A9A96}
.error-screen{background:#FEE2E2;border:1px solid #FECACA;padding:16px;color:#B91C1C;font-size:13px;margin:1rem 0}

.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.year-tabs{display:flex;gap:4px;flex-wrap:wrap}
.yr{padding:5px 14px;font-size:12px;border-radius:2px;cursor:pointer;border:1px solid #E2E0DC;background:#fff;color:#6B6B6B}
.yr.active{background:#C8621E;border-color:#C8621E;color:#fff;font-weight:500}
.yr:hover:not(.active){background:#F2F1EE}

/* ─── 主分類列 ─── */
.cat-bar{display:flex;gap:0;border-bottom:1.5px solid #E2E0DC;margin-bottom:0;background:#fff;border-top:1px solid #E2E0DC;border-left:1px solid #E2E0DC;border-right:1px solid #E2E0DC;flex-wrap:wrap}
.cat{padding:12px 22px;font-size:13px;cursor:pointer;border:none;border-bottom:2.5px solid transparent;color:#6B6B6B;background:#fff;letter-spacing:.04em;position:relative;border-right:1px solid #EFEEEA}
.cat:last-child{border-right:none}
.cat.active{color:#C8621E;border-bottom-color:#C8621E;font-weight:500;background:#FBF0E8}
.cat:hover:not(.active){color:#1C1C1C;background:#F8F7F5}

/* ─── 子分頁列（在主分類下） ─── */
.subtab-bar{display:none;background:#FAF9F6;border:1px solid #E2E0DC;border-top:none;padding:10px 16px;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.subtab-bar.show{display:flex}
.subtab-label{font-size:10px;color:#9A9A96;letter-spacing:.08em;text-transform:uppercase;margin-right:6px}
.subtab{padding:6px 14px;font-size:12px;cursor:pointer;border:1px solid #E2E0DC;background:#fff;color:#6B6B6B;border-radius:2px;letter-spacing:.03em}
.subtab.active{background:#C8621E;border-color:#C8621E;color:#fff;font-weight:500}
.subtab:hover:not(.active){background:#F2F1EE}

.view{display:none}.view.active{display:block}

.mcard-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.mcard{background:#fff;padding:1rem;border:1px solid #E2E0DC}
.mcard-label{font-size:11px;color:#9A9A96;margin-bottom:5px}
.mcard-val{font-size:26px;font-weight:500;line-height:1;color:#1C1C1C}
.mcard-sub{font-size:11px;color:#B4B2A9;margin-top:4px}

.kpi-block{background:#fff;border:1px solid #E2E0DC;padding:1.25rem}
.kpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.kpi-title{font-size:14px;font-weight:500}
.kpi-meta{font-size:11px;color:#9A9A96}
.progress-row{display:grid;grid-template-columns:120px 1fr 150px 52px;align-items:center;gap:10px;margin-bottom:9px}
.p-label{font-size:11px;color:#6B6B6B}
.p-track{height:6px;background:#F2F1EE;position:relative;overflow:hidden}
.p-fc{position:absolute;top:0;left:0;height:100%}
.p-ac{position:absolute;top:0;left:0;height:100%}
.p-nums{font-size:11px;color:#1C1C1C}
.pct-pill{font-size:10px;padding:2px 6px;font-weight:500;white-space:nowrap;border-radius:2px}
.pct-ok{background:#D1FAE5;color:#1A6B45}
.pct-warn{background:#FEF3C7;color:#A35200}
.pct-danger{background:#FEE2E2;color:#B91C1C}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#9A9A96;margin-top:10px}
.ld{width:10px;height:4px;display:inline-block;vertical-align:middle;margin-right:4px}

.chart-wrap{position:relative;width:100%}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.filter-bar input,.filter-bar select{font-size:12px;padding:5px 10px;height:32px;border-radius:2px;border:1px solid #E2E0DC;background:#fff;color:#1C1C1C;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#C8621E}
.btn-sm{font-size:12px;padding:5px 12px;height:32px;border-radius:2px;cursor:pointer;border:1px solid #E2E0DC;background:#fff;color:#1C1C1C}
.btn-sm:hover{background:#F2F1EE}
.btn-blue{background:#FBF0E8;border-color:#EDB896;color:#C8621E;font-weight:500}
.btn-blue:hover{background:#F5DCC7}

.tbl-wrap{overflow-x:auto;border:1px solid #E2E0DC;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{text-align:left;font-size:11px;font-weight:500;color:#9A9A96;padding:10px 10px;border-bottom:1px solid #E2E0DC;background:#FAF9F6;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
td{padding:9px 10px;border-bottom:1px solid #F2F1EE;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1C1C1C}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAF9F6}
.sbadge{display:inline-block;font-size:10px;padding:3px 8px;font-weight:500;border-radius:2px}
.s0{background:#FBF0E8;color:#C8621E}.s1{background:#EEEDFE;color:#3C3489}
.s2{background:#FEF3C7;color:#A35200}.s3{background:#D1FAE5;color:#1A6B45}

.qa-wrap{background:#fff;border:1px solid #E2E0DC;padding:1.25rem;margin-bottom:1rem}
.qa-title{font-size:14px;font-weight:500;margin-bottom:4px}
.qa-sub{font-size:11px;color:#9A9A96;margin-bottom:14px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border:1px solid #E2E0DC;padding:1.5rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.14)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:#9A9A96;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.field input,.field select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #E2E0DC;background:#fff;color:#1C1C1C;outline:none}
.field input:focus,.field select:focus{border-color:#C8621E}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-save{background:#FBF0E8;border:1px solid #EDB896;color:#C8621E;font-size:13px;padding:7px 18px;cursor:pointer;font-weight:500}
.btn-save:hover{background:#F5DCC7}
.btn-cancel{background:#fff;border:1px solid #E2E0DC;color:#6B6B6B;font-size:13px;padding:7px 18px;cursor:pointer}
.btn-cancel:hover{background:#F2F1EE}
.watermark{font-size:10px;color:#B4B2A9;text-align:right;margin-top:1.5rem}

@media(max-width:720px){
  .mcard-grid{grid-template-columns:1fr 1fr}
  .progress-row{grid-template-columns:90px 1fr 110px 44px}
  .page{padding:1rem}
}

.settings-btn{position:fixed;top:16px;right:20px;width:34px;height:34px;background:#fff;border:1px solid #E2E0DC;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.settings-btn:hover{background:#F2F1EE}
.settings-panel{display:none;position:fixed;top:56px;right:20px;width:340px;background:#fff;border:1px solid #E2E0DC;padding:1.25rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.settings-panel.open{display:block}
.settings-panel h4{font-size:13px;font-weight:500;margin-bottom:4px;color:#1C1C1C}
.settings-panel p{font-size:11px;color:#9A9A96;margin-bottom:12px;line-height:1.6}
.settings-row{display:flex;gap:8px}
.settings-input{flex:1;font-size:12px;padding:7px 10px;border:1px solid #E2E0DC;background:#fff;color:#1C1C1C;outline:none;font-family:monospace}
.settings-input:focus{border-color:#C8621E}
.settings-save{font-size:12px;padding:7px 14px;border:1px solid #EDB896;background:#FBF0E8;color:#C8621E;cursor:pointer;font-weight:500;white-space:nowrap}
.settings-save:hover{background:#F5DCC7}
.settings-status{font-size:11px;margin-top:8px;padding:6px 10px}
.settings-status.ok{background:#D1FAE5;color:#1A6B45}
.settings-status.empty{background:#FEF3C7;color:#A35200}

/* 搜尋 Hero */
.search-hero{background:#fff;border:1px solid #E2E0DC;padding:1.25rem;margin-bottom:1rem}

/* 返回主平台 */
.back-to-platform{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#6B6B6B;text-decoration:none;padding:5px 12px;border:1px solid #E2E0DC;background:#fff;letter-spacing:.04em}
.back-to-platform:hover{background:#FBF0E8;color:#C8621E;border-color:#EDB896}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div>
      <div class="brand-kicker">IST · 看見台灣基金會</div>
      <h1>文章進度控管儀表板</h1>
      <p id="date-label"></p>
    </div>
    <a href="../IST Content Platform.html" class="back-to-platform">← 回主平台</a>
  </div>
  <div id="app">
    <div class="loading-screen">載入資料中，請稍候…</div>
  </div>
</div>

<div class="modal-overlay" id="ops-modal">
  <div class="modal">
    <h3 id="modal-title">新增文章</h3>
    <div class="field"><label>年份</label><select id="m-year"></select></div>
    <div class="field"><label>標題</label><input id="m-title" placeholder="文章標題"></div>
    <div class="field"><label>狀態</label>
      <select id="m-status"><option>審稿/校稿</option><option>翻譯中</option><option>待上架</option><option>已上架</option></select>
    </div>
    <div class="field"><label>中文預計上架日</label><input type="date" id="m-date-zh"></div>
    <div class="field"><label>英文預計上架日</label><input type="date" id="m-date-en"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveArticle()">儲存</button>
    </div>
  </div>
</div>

<button class="settings-btn" onclick="toggleSettings()" title="API 設定">⚙</button>
<div class="settings-panel" id="settings-panel">
  <h4>Gemini API Key 設定</h4>
  <p>每個人用自己申請的 Gemini API Key 即可。Key 只存在本機。</p>
  <div class="settings-row">
    <input class="settings-input" id="settings-key-input" type="password" placeholder="貼上你的 Gemini API Key">
    <button class="settings-save" onclick="saveGeminiKey()">儲存</button>
  </div>
  <div class="settings-status" id="settings-status"></div>
</div>

<script>
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    const saved = localStorage.getItem('gemini_key') || '';
    const input = document.getElementById('settings-key-input');
    if (saved) input.placeholder = 'Key 已設定（貼上新 Key 可覆蓋）';
    updateSettingsStatus();
  }
}
function saveGeminiKey() {
  const input = document.getElementById('settings-key-input');
  const val = input.value.trim();
  if (!val) { updateSettingsStatus('請貼上你的 Gemini API Key', false); return; }
  localStorage.setItem('gemini_key', val);
  window.__GEMINI_KEY__ = val;
  input.value = '';
  input.placeholder = 'Key 已設定';
  updateSettingsStatus('儲存成功！AI 功能已啟用', true);
}
function updateSettingsStatus(msg, ok) {
  const el = document.getElementById('settings-status');
  const key = localStorage.getItem('gemini_key');
  if (msg !== undefined) {
    el.textContent = msg;
    el.className = 'settings-status ' + (ok ? 'ok' : 'empty');
  } else if (key) {
    el.textContent = 'Key 已設定，AI 功能已啟用';
    el.className = 'settings-status ok';
  } else {
    el.textContent = '尚未設定 Key，AI 功能暫時無法使用';
    el.className = 'settings-status empty';
  }
}
document.addEventListener('click', e => {
  const panel = document.getElementById('settings-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.classList.contains('settings-btn')) {
    panel.classList.remove('open');
  }
});
window.__GEMINI_KEY__ = localStorage.getItem('gemini_key') || '';
</script>

<!-- 搜尋頁額外樣式 -->
<style>
.qa-wrap{background:#fff;border:1px solid #E2E0DC;padding:1.25rem;margin-bottom:1rem}
</style>

<script src="main.js"></script>
<script src="shim.js?v=3"></script>
</body>
</html>
